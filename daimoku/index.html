<script type="text/babel">
const{useState,useEffect,useRef,useMemo}=React;

// ─── Firebase ───
const FBC={apiKey:"AIzaSyACCr1WZwQZL6DXR9QPG5EX4vZz9BJaYBw",authDomain:"daimoku-freude.firebaseapp.com",databaseURL:"https://daimoku-freude-default-rtdb.firebaseio.com",projectId:"daimoku-freude",storageBucket:"daimoku-freude.firebasestorage.app",messagingSenderId:"637502572501",appId:"1:637502572501:web:c00b0f7e3f47b1ce21df5c"};
let db=null;
try{firebase.initializeApp(FBC);db=firebase.database();}catch(e){console.warn("Firebase:",e);}

const MAIN_SITE="https://setagaya2026.github.io/setagaya-daiku/";
const C={crimson:"#9B1B30",crimsonDark:"#6d1220",gold:"#C9963A",goldLight:"#e8c06a",goldPale:"#f5e6c8",cream:"#FAF6EF",dark:"#1a1208",text:"#2d1f0f",muted:"#7a6a55",navy:"#1a3a5c",navyDark:"#0d2035",white:"#fff",cardBg:"#fff",green:"#2e7d32"};
const TABS=[{id:"home",label:"唱題",icon:"⏱"},{id:"record",label:"記録",icon:"📊"},{id:"prayer",label:"御祈念",icon:"🙏"},{id:"goals",label:"目標",icon:"🎯"}];
const SPEED_PRESETS=[{label:"ゆっくり",perMin:25},{label:"ふつう",perMin:40},{label:"はやい",perMin:55},{label:"カスタム",perMin:null}];
const GOAL_PRESETS=[10,30,50,100];

// ─── localStorage ───
const PK="df-personal-v4";
function loadL(){try{return JSON.parse(localStorage.getItem(PK));}catch{return null;}}
function saveL(d){try{localStorage.setItem(PK,JSON.stringify(d));}catch{}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function defP(){return{userId:gid(),userName:"",daimokuPerMin:40,totalSeconds:0,totalHen:0,sessions:[],privatePrayers:[],goals:[{id:gid(),label:"Re:Freudeまでに",target:100000}],heartedIds:[]};}

// ─── Utils ───
function fmt(s){return`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
function cH(sec,pm){return Math.round(sec*pm/60);}
function ld(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function tdk(iso){return ld(new Date(iso));}
function jdt(iso){const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function rec(ss){let ts=0,th=0;ss.forEach(s=>{ts+=s.seconds;th+=s.hen;});return{totalSeconds:ts,totalHen:th};}
function rcAll(ss,pm){return ss.map(s=>({...s,hen:cH(s.seconds,pm)}));}
function dsum(ss){const m={};ss.forEach(s=>{const k=tdk(s.date);if(!m[k])m[k]={date:k,seconds:0,hen:0,count:0};m[k].seconds+=s.seconds;m[k].hen+=s.hen;m[k].count++;});return Object.values(m).sort((a,b)=>b.date.localeCompare(a.date));}
function l7(ss){const r=[],t=new Date();for(let i=6;i>=0;i--){const d=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);const k=ld(d);const dn=["日","月","火","水","木","金","土"][d.getDay()];const dd=ss.filter(s=>tdk(s.date)===k);r.push({key:k,dayName:dn,hen:dd.reduce((a,s)=>a+s.hen,0)});}return r;}
function todH(ss){const k=ld(new Date());return ss.filter(s=>tdk(s.date)===k).reduce((a,s)=>a+s.hen,0);}
function stk(ss){if(!ss.length)return 0;const days=new Set(ss.map(s=>tdk(s.date)));let c=0;const d=new Date();while(days.has(ld(d))){c++;d.setDate(d.getDate()-1);}return c;}
// 応援メッセージ
function cheers(hen,streak){
  if(hen===0)return"さあ、今日も唱題しよう！";
  if(streak>=7)return`${streak}日連続！素晴らしい持続力です🔥`;
  if(hen>=10000)return"1万遍突破！この勢いで！";
  if(hen>=1000)return"いい調子！積み重ねが力になる💪";
  return"今日も頑張っていますね！";
}

// ─── Firebase: Global Stats ───
function useGlobal(){
  const[s,setS]=useState({totalHen:0,totalSessions:0,totalSeconds:0});
  useEffect(()=>{if(!db)return;const ref=db.ref("global-stats");const h=ref.on("value",sn=>{const v=sn.val();if(v)setS({totalHen:v.totalHen||0,totalSessions:v.totalSessions||0,totalSeconds:v.totalSeconds||0});},e=>console.error("gs read:",e));return()=>ref.off("value",h);},[]);
  return s;
}
function addG(hen,sec){if(!db)return;db.ref("global-stats/totalHen").transaction(c=>(c||0)+hen).catch(()=>{});db.ref("global-stats/totalSessions").transaction(c=>(c||0)+1).catch(()=>{});db.ref("global-stats/totalSeconds").transaction(c=>(c||0)+sec).catch(()=>{});}
function subG(hen,sec){if(!db)return;db.ref("global-stats/totalHen").transaction(c=>Math.max((c||0)-hen,0)).catch(()=>{});db.ref("global-stats/totalSessions").transaction(c=>Math.max((c||0)-1,0)).catch(()=>{});db.ref("global-stats/totalSeconds").transaction(c=>Math.max((c||0)-sec,0)).catch(()=>{});}

// ─── Firebase: Active Chanting (人数＋名前リスト) ───
function useActive(uid,uname,isRun){
  const[data,setData]=useState({count:0,names:[]});
  // リスナー
  useEffect(()=>{if(!db)return;const ref=db.ref("active-chanting");const h=ref.on("value",sn=>{const v=sn.val();if(v){const entries=Object.values(v);setData({count:entries.length,names:entries.map(e=>e.name||"匿名")});}else{setData({count:0,names:[]});}},e=>console.error("ac read:",e));return()=>ref.off("value",h);},[]);
  // 自分の状態
  useEffect(()=>{if(!db||!uid)return;const ref=db.ref("active-chanting/"+uid);
    if(isRun){ref.set({name:uname||"匿名",since:firebase.database.ServerValue.TIMESTAMP}).catch(e=>console.error("ac set:",e));ref.onDisconnect().remove();}
    else{ref.remove().catch(()=>{});ref.onDisconnect().cancel();}
    return()=>{ref.remove().catch(()=>{});ref.onDisconnect().cancel();};
  },[isRun,uid,uname]);
  return data;
}

// ─── Firebase: Shared Prayers ───
function useSP(){const[p,setP]=useState([]);useEffect(()=>{if(!db)return;const ref=db.ref("shared-prayers");const h=ref.on("value",sn=>{const v=sn.val();setP(v?Object.values(v).sort((a,b)=>(b.hearts||0)-(a.hearts||0)):[]);});return()=>ref.off("value",h);},[]);return p;}
function aspf(p){if(db)db.ref("shared-prayers/"+p.id).set(p).catch(()=>{});}
function uspf(id,u){if(db)db.ref("shared-prayers/"+id).update(u).catch(()=>{});}
function dspf(id){if(db)db.ref("shared-prayers/"+id).remove().catch(()=>{});}
function hspf(id){if(db)db.ref("shared-prayers/"+id+"/hearts").transaction(c=>(c||0)+1).catch(()=>{});}

// ─── Confetti ───
function Confetti({show}){if(!show)return null;const cols=[C.crimson,C.gold,"#e74c6f","#4caf50","#ff9800",C.goldLight];
  return(<div style={{position:"fixed",top:0,left:0,right:0,height:"100vh",pointerEvents:"none",zIndex:300}}>
    {Array.from({length:24}).map((_,i)=>(<div key={i} className="cp" style={{left:`${5+Math.random()*90}%`,top:`${Math.random()*20}%`,width:Math.random()*10+4,height:Math.random()*10+4,background:cols[i%cols.length],animationDelay:`${Math.random()*0.5}s`,borderRadius:Math.random()>.5?"50%":"2px"}}/>))}
  </div>);
}

// ─── NameSetup ───
function NameSetup({onDone}){const[n,setN]=useState("");
  return(<div style={{position:"fixed",inset:0,background:C.dark,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{textAlign:"center",padding:32,maxWidth:360,animation:"fadeIn .5s ease"}}>
      <div style={{fontSize:48,marginBottom:16}}>🙏</div>
      <div style={{fontSize:22,fontWeight:900,color:C.goldLight,fontFamily:"'Noto Serif JP',serif",marginBottom:4}}>題目<span style={{color:C.white}}>フロイデ</span></div>
      <div style={{fontSize:10,color:C.gold,marginBottom:24,letterSpacing:".1em"}}>世田谷ユースアクションフェス 2026.11.29</div>
      <div style={{fontSize:14,color:C.cream,marginBottom:16}}>表示名を入力してください</div>
      <input value={n} onChange={e=>setN(e.target.value)} placeholder="例：せたがや太郎"
        style={{...S.input,background:"rgba(255,255,255,.1)",color:"#fff",border:`1px solid ${C.gold}`,textAlign:"center",fontSize:16,padding:14}}
        onKeyDown={e=>{if(e.key==="Enter"&&n.trim())onDone(n.trim());}}/>
      <button onClick={()=>{if(n.trim())onDone(n.trim());}} disabled={!n.trim()}

// ─── Settings ───
function SettingsPanel({P,setP,onClose}){
  const[pr,setPr]=useState(()=>{const p=SPEED_PRESETS.find(p=>p.perMin===P.daimokuPerMin);return p?p.label:"カスタム";});
  const[cs,setCs]=useState(String(P.daimokuPerMin));const[sr,setSr]=useState(false);const[en,setEn]=useState(P.userName);const[rst,setRst]=useState(false);
  const cur=pr==="カスタム"?(parseInt(cs)||40):(SPEED_PRESETS.find(p=>p.label===pr)?.perMin||40);
  const chg=cur!==P.daimokuPerMin;
  const apply=(rc)=>{let ns=P.sessions;if(rc)ns=rcAll(P.sessions,cur);const t=rec(ns);const nd={...P,daimokuPerMin:cur,sessions:ns,...t};setP(nd);saveL(nd);setSr(false);onClose();};
  const sn=()=>{if(en.trim()){const nd={...P,userName:en.trim()};setP(nd);saveL(nd);}};
  const doRst=()=>{if(P.totalHen>0)subG(P.totalHen,P.totalSeconds);const nd={...P,totalSeconds:0,totalHen:0,sessions:[]};setP(nd);saveL(nd);setRst(false);onClose();};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{width:"100%",maxWidth:430,background:C.cream,borderRadius:"20px 20px 0 0",padding:20,maxHeight:"85vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:C.text,fontFamily:"'Noto Serif JP',serif"}}>⚙ 設定</h2>
        <button onClick={onClose} style={{border:"none",background:"transparent",fontSize:22,color:C.muted,cursor:"pointer",padding:4}}>✕</button>
      </div>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>表示名</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}><input value={en} onChange={e=>setEn(e.target.value)} style={{...S.input,flex:1}}/><button onClick={sn} style={{...S.btnMain,padding:"8px 16px",fontSize:13}}>保存</button></div>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>唱題スピード</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        {SPEED_PRESETS.map(p=>{const a=pr===p.label;return(<button key={p.label} onClick={()=>{setPr(p.label);if(p.perMin)setCs(String(p.perMin));}}
          style={{padding:"10px 4px",borderRadius:8,cursor:"pointer",textAlign:"center",border:a?`2px solid ${C.crimson}`:`1px solid ${C.goldPale}`,background:a?`${C.crimson}10`:C.white}}>
          <div style={{fontSize:12,fontWeight:700,color:a?C.crimson:C.text}}>{p.label}</div>
          {p.perMin&&<div style={{fontSize:10,color:C.muted}}>{p.perMin}/分</div>}
        </button>);})}
      </div>
      {pr==="カスタム"&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><input type="range" min="10" max="80" value={cs} onChange={e=>setCs(e.target.value)} style={{flex:1,accentColor:C.crimson}}/><input type="number" value={cs} onChange={e=>setCs(e.target.value)} style={{...S.input,width:60,textAlign:"center",padding:6}}/></div>}
      <div style={{background:C.goldPale,borderRadius:8,padding:"8px 14px",marginBottom:16,fontSize:12,color:C.muted}}>
        10分=<b style={{color:C.crimson}}>{cH(600,cur).toLocaleString()}</b>遍 / 1時間=<b style={{color:C.crimson}}>{cH(3600,cur).toLocaleString()}</b>遍
        {chg&&<div style={{color:C.crimson,marginTop:4}}>{P.daimokuPerMin}→{cur}遍/分</div>}
      </div>
      {chg&&!sr&&<button onClick={()=>setSr(true)} style={{...S.btnMain,width:"100%",marginBottom:8,fontSize:13}}>変更する</button>}
      {sr&&<div style={{...S.card,border:`2px solid ${C.gold}`,marginBottom:12}}><div style={{fontSize:13,fontWeight:700,marginBottom:8}}>過去も再計算？</div><div style={{display:"flex",gap:8}}><button onClick={()=>apply(false)} style={{...S.btnSec,flex:1}}>今後のみ</button><button onClick={()=>apply(true)} style={{...S.btnMain,flex:1,fontSize:13}}>全て再計算</button></div></div>}
      <div style={{borderTop:`1px solid ${C.goldPale}`,marginTop:16,paddingTop:16}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>データリセット</div>
        {!rst?<button onClick={()=>setRst(true)} style={{...S.btnSec,width:"100%",color:C.crimson,borderColor:C.crimson}}>唱題記録をリセット</button>
        :<div style={{...S.card,border:`2px solid ${C.crimson}`,background:"#fff5f5"}}><div style={{fontSize:13,fontWeight:700,color:C.crimson,marginBottom:8}}>⚠ 本当にリセットしますか？</div><p style={{fontSize:12,color:C.muted,marginBottom:12}}>唱題時間・遍数・履歴が全削除されます。御祈念と目標は残ります。</p><div style={{display:"flex",gap:8}}><button onClick={()=>setRst(false)} style={{...S.btnSec,flex:1}}>キャンセル</button><button onClick={doRst} style={{...S.btnMain,flex:1,fontSize:13,background:"linear-gradient(135deg,#c62828,#b71c1c)"}}>リセット</button></div></div>}
      </div>
      {!chg&&!rst&&<button onClick={onClose} style={{...S.btnSec,width:"100%",marginTop:12}}>閉じる</button>}
    </div>
  </div>);
}

// ─── Stopwatch (タイマー状態はApp側で管理→タブ切替でも止まらない) ───
function StopwatchTab({P,setP,gs,active,elapsed,running,setRunning,onSave}){
  const th=todH(P.sessions);const sk=stk(P.sessions);const msg=cheers(th,sk);
  return(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}>
    {/* 世田谷全体 */}
    <div style={{background:`linear-gradient(135deg,${C.dark},#2d1a0a)`,borderRadius:10,padding:"12px 14px",marginBottom:8,color:"#fff"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:9,letterSpacing:".1em",color:C.goldLight,marginBottom:2}}>🌍 世田谷みんなの唱題</div>
          <div style={{fontSize:22,fontWeight:900,fontFamily:"'Noto Serif JP',serif"}}>{gs.totalHen.toLocaleString()} <span style={{fontSize:11,fontWeight:400,opacity:.7}}>遍</span></div></div>
        <div style={{textAlign:"right"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:active.count>0?"#76ff03":"#888",boxShadow:active.count>0?"0 0 8px #76ff03":"none",display:"inline-block",animation:active.count>0?"pulse 1.5s infinite":"none"}}/>
            <span style={{fontSize:10,color:"rgba(255,255,255,.7)"}}>唱題中</span></div>
          <div style={{fontSize:18,fontWeight:800}}>{active.count} <span style={{fontSize:10,fontWeight:400,opacity:.7}}>人</span></div>
        </div>
      </div>
      {/* 唱題中メンバーの名前 */}
      {active.count>0&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,.1)",display:"flex",flexWrap:"wrap",gap:4}}>
        {active.names.map((n,i)=>(<span key={i} style={{background:"rgba(255,255,255,.12)",borderRadius:12,padding:"2px 10px",fontSize:10,color:C.goldLight}}>{n}</span>))}
      </div>}
    </div>

    {/* Today / Streak / Total */}
    <div style={{display:"flex",gap:6,marginBottom:6}}>
      <div style={{...S.card,flex:1,textAlign:"center",marginBottom:0,padding:8}}><div style={{fontSize:9,color:C.muted}}>今日</div><div style={{fontSize:18,fontWeight:800,color:C.crimson,fontFamily:"'Noto Serif JP',serif"}}>{th.toLocaleString()}</div><div style={{fontSize:8,color:C.muted}}>遍</div></div>
      <div style={{...S.card,flex:1,textAlign:"center",marginBottom:0,padding:8}}><div style={{fontSize:9,color:C.muted}}>連続</div><div style={{fontSize:18,fontWeight:800,color:C.gold,fontFamily:"'Noto Serif JP',serif"}}>{sk}</div><div style={{fontSize:8,color:C.muted}}>日🔥</div></div>
      <div style={{...S.card,flex:1,textAlign:"center",marginBottom:0,padding:8}}><div style={{fontSize:9,color:C.muted}}>累計</div><div style={{fontSize:18,fontWeight:800,color:C.navy,fontFamily:"'Noto Serif JP',serif"}}>{P.totalHen.toLocaleString()}</div><div style={{fontSize:8,color:C.muted}}>遍</div></div>
    </div>
    {/* 応援メッセージ */}
    <div style={{fontSize:11,color:C.muted,textAlign:"center",marginBottom:8,fontStyle:"italic"}}>{msg}</div>

    {/* Timer */}
    <div style={{display:"flex",justifyContent:"center",margin:"4px 0"}}>
      <div style={{position:"relative",width:220,height:220}}>
        {(()=>{const r=100,c=2*Math.PI*r,p=Math.min(elapsed/3600,1);return(
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle cx="110" cy="110" r={r} fill="none" stroke={C.goldPale} strokeWidth="7"/>
          <circle cx="110" cy="110" r={r} fill="none" stroke="url(#cg)" strokeWidth="7" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c*(1-p)} transform="rotate(-90 110 110)" style={{transition:"stroke-dashoffset .3s"}}/>
          <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={C.crimson}/><stop offset="100%" stopColor={C.gold}/></linearGradient></defs>
        </svg>);})()}
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
          <div style={{fontSize:32,fontWeight:800,fontFamily:"'Noto Serif JP',serif",letterSpacing:2,color:C.dark}}>{fmt(elapsed)}</div>
          <div style={{fontSize:14,color:C.crimson,fontWeight:700,marginTop:2}}>{cH(elapsed,P.daimokuPerMin).toLocaleString()} 遍</div>
          <div style={{fontSize:9,color:C.muted,marginTop:1}}>{P.daimokuPerMin}遍/分</div>

// ═══════ App (タイマー状態をここで管理) ═══════
function App(){
  const[tab,setTab]=useState("home");
  const[P,setP]=useState(null);
  const[loading,setLoading]=useState(true);
  const[needsName,setNeedsName]=useState(false);
  const[showSet,setShowSet]=useState(false);
  // ⏱ タイマー状態をApp本体で管理（タブ切替しても止まらない）
  const[running,setRunningRaw]=useState(false);
  const[elapsed,setElapsed]=useState(0);
  const[startTime,setStartTime]=useState(null);
  const[showConf,setShowConf]=useState(false);
  const[savedMsg,setSavedMsg]=useState("");
  const timerRef=useRef(null);

  // タイマーロジック
  useEffect(()=>{
    if(running&&startTime){
      timerRef.current=setInterval(()=>{setElapsed(Math.floor((Date.now()-startTime)/1000));},250);
    }else{if(timerRef.current)clearInterval(timerRef.current);}
    return()=>{if(timerRef.current)clearInterval(timerRef.current);};
  },[running,startTime]);

  const setRunning=(v)=>{
    if(v==="reset"){setRunningRaw(false);setElapsed(0);setStartTime(null);return;}
    if(v){setRunningRaw(true);setStartTime(Date.now()-elapsed*1000);}
    else{setRunningRaw(false);}
  };

  const gs=useGlobal();
  const sp=useSP();
  const active=useActive(P?.userId,P?.userName,running);

  useEffect(()=>{const p=loadL();if(p){const d=defP();const m={...d,...p,sessions:p.sessions||[],privatePrayers:p.privatePrayers||[],goals:p.goals||d.goals,heartedIds:p.heartedIds||[]};const t=rec(m.sessions);setP({...m,...t});}else{setP(defP());setNeedsName(true);}setLoading(false);},[]);
  useEffect(()=>{if(P&&!P.userName)setNeedsName(true);},[P]);

  const handleName=(n)=>{const nd={...P,userName:n};setP(nd);saveL(nd);setNeedsName(false);};

  const onSave=()=>{
    if(elapsed<=0||!P)return;
    const h=cH(elapsed,P.daimokuPerMin);
    const s={id:gid(),date:new Date().toISOString(),seconds:elapsed,hen:h};
    const ns=[...P.sessions,s];const t=rec(ns);
    const nd={...P,...t,sessions:ns};setP(nd);saveL(nd);
    addG(h,elapsed);
    setRunning("reset");
    setShowConf(true);setSavedMsg(`${h.toLocaleString()}遍を記録！`);
    setTimeout(()=>{setShowConf(false);setSavedMsg("");},2500);
  };

  if(loading)return(<div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",background:C.dark}}><div style={{textAlign:"center",color:C.goldLight}}><div style={{fontSize:48,marginBottom:16}}>🙏</div><div style={{fontSize:16,fontFamily:"'Noto Serif JP',serif"}}>読み込み中...</div></div></div>);
  if(needsName)return <NameSetup onDone={handleName}/>;

  const dL=Math.max(0,Math.ceil((new Date("2026-11-29T00:00:00+09:00").getTime()-Date.now())/86400000));

  return(<div style={S.app}>
    <Confetti show={showConf}/>
    {savedMsg&&<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${C.green},#1b5e20)`,color:"#fff",borderRadius:20,padding:"8px 20px",fontSize:14,fontWeight:700,zIndex:200,animation:"popIn .3s ease",boxShadow:"0 4px 20px rgba(0,0,0,.3)"}}>🎉 {savedMsg}</div>}

    <div style={S.header}><div style={S.headerInner}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <a href={MAIN_SITE} style={{fontSize:10,color:C.goldLight,textDecoration:"none",opacity:.8,whiteSpace:"nowrap"}}>◀ 練習サイト</a>
      <div style={{textAlign:"center",flex:1}}>
        <div style={{fontSize:17,fontWeight:900,fontFamily:"'Noto Serif JP',serif",letterSpacing:".08em"}}>題目<span style={{color:C.goldLight}}>フロイデ</span></div>
      </div>
      <button onClick={()=>setShowSet(true)} style={{border:"none",background:"transparent",color:C.goldLight,fontSize:16,cursor:"pointer",padding:4}}>⚙</button>
    </div></div></div>
    <div style={S.countdown}><div style={S.cdBg}/><div style={{position:"relative",zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
      <span style={{fontSize:10,letterSpacing:".1em",color:"rgba(255,255,255,.7)"}}>Re:Freudeまで</span>
      <span style={{fontSize:26,fontWeight:900,fontFamily:"'Noto Serif JP',serif"}}>{dL}</span><span style={{fontSize:10,opacity:.7}}>日</span>
    </div></div>

    <div style={S.content}>
      {tab==="home"&&<StopwatchTab P={P} setP={setP} gs={gs} active={active} elapsed={elapsed} running={running} setRunning={setRunning} onSave={onSave}/>}
      {tab==="record"&&<RecordTab P={P} setP={setP}/>}
      {tab==="prayer"&&<PrayerTab P={P} setP={setP} sp={sp}/>}
      {tab==="goals"&&<GoalsTab P={P} setP={setP} gs={gs}/>}
    </div>
    <div style={S.tabBar}>{TABS.map(t=>{
      const isActive=tab===t.id;
      const showDot=t.id==="home"&&running&&tab!=="home";
      return(<button key={t.id} onClick={()=>setTab(t.id)} style={{...S.tabBtn,...(isActive?S.tabBtnAct:{})}}>
        <span style={{fontSize:20,position:"relative"}}>{t.icon}{showDot&&<span style={{position:"absolute",top:-2,right:-6,width:7,height:7,borderRadius:"50%",background:C.crimson}}/>}</span>
        <span style={{fontSize:9,marginTop:1}}>{t.label}</span>
      </button>);
    })}</div>
    {showSet&&<SettingsPanel P={P} setP={setP} onClose={()=>setShowSet(false)}/>}
  </div>);
}

const S={
  app:{maxWidth:430,margin:"0 auto",height:"100%",background:C.cream,fontFamily:"'Noto Sans JP',sans-serif",color:C.text,display:"flex",flexDirection:"column",overflow:"hidden"},
  header:{background:`linear-gradient(135deg,${C.dark} 0%,#2d1a0a 50%,${C.dark} 100%)`,color:"#fff",position:"sticky",top:0,zIndex:10,borderBottom:`1px solid rgba(201,150,58,.3)`,flexShrink:0},
  headerInner:{padding:"8px 12px 6px"},
  countdown:{background:`linear-gradient(135deg,${C.crimsonDark},${C.crimson})`,color:"#fff",textAlign:"center",padding:"6px 16px",position:"relative",overflow:"hidden",flexShrink:0},
  cdBg:{position:"absolute",inset:0,background:"repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.04) 8px,rgba(255,255,255,.04) 9px)"},
  content:{flex:1,paddingTop:8,paddingBottom:64,overflowY:"auto",WebkitOverflowScrolling:"touch"},
  tabBar:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,display:"flex",background:"#fff",borderTop:`1px solid ${C.goldPale}`,padding:"3px 0 env(safe-area-inset-bottom,5px)",zIndex:20},
  tabBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",border:"none",background:"transparent",padding:"3px 0",color:C.muted,cursor:"pointer"},
  tabBtnAct:{color:C.crimson},
  card:{background:C.cardBg,borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.05)",marginBottom:10,border:"1px solid rgba(0,0,0,.05)"},
  cumCard:{background:`linear-gradient(135deg,${C.crimsonDark},${C.crimson})`,color:"#fff",borderRadius:10,padding:"16px",textAlign:"center"},
  cumSub:{background:"rgba(255,255,255,.12)",borderRadius:6,padding:"6px 14px"},
  btnMain:{padding:"12px 24px",border:"none",borderRadius:50,background:`linear-gradient(135deg,${C.crimson},${C.crimsonDark})`,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(155,27,48,.3)"},
  btnSec:{padding:"10px 18px",border:`1px solid ${C.goldPale}`,borderRadius:50,background:C.cardBg,color:C.muted,fontSize:12,cursor:"pointer"},
  subTab:{flex:1,padding:"10px 0",border:"none",background:"transparent",fontSize:13,color:C.muted,cursor:"pointer",borderBottom:"2px solid transparent",marginBottom:-2},
  textarea:{width:"100%",padding:12,border:`1px solid ${C.goldPale}`,borderRadius:8,fontSize:13,resize:"vertical",minHeight:70,fontFamily:"inherit",boxSizing:"border-box",background:C.cream},
  input:{width:"100%",padding:10,border:`1px solid ${C.goldPale}`,borderRadius:8,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",background:C.cream},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
