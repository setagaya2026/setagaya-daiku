// 世田谷ゆかりの御指導（聖教新聞社 許諾済）
// ※ body に正確な原文を貼り付けてください（改行は \n で）
const ESSAYS=[
  {id:"e1988",date:"1988年4月29日",title:"「生命の大法」で時代を蘇生",subtitle:"第3回全国青年部幹部会 / 東京池田記念講堂（世田谷・用賀）",author:"池田大作先生",publication:"聖教新聞",summary:"昭和63年4月29日、世田谷・用賀の東京池田記念講堂で開催された第3回全国青年部幹部会でのスピーチ。戸田先生の青年への期待、仏法の因果論、精神の原動力を失った物質文明への警鐘、そして中国「長征」の歴史に学ぶ広布の長征など、青年への万感の激励が込められている。",body:"「生命の大法」で時代を蘇生\n●第3回全国青年部幹部会●\n〔昭和63年4月29日 東京池田記念講堂〕\n人生を無限に開く妙法の力用\n一、本日は雨の中にもかかわらず、全国から多くの青年部、また地元・世田谷区の同志の方々が集い、落成したばかりの講堂で、まことに盛大に5・3の記念行事を開幕することができた。特に世田谷の皆さまには、心から「おめでとう」と申し上げたい(大拍手)。\n一、本日もこの席におられるが、実は昨晩、世田谷に住む婦人部の幹部が「あしたは晴天で暖かく、素晴らしい天気で迎えます」と言ってくださった。ありがたい伝言であった。\nだが、今朝は雨であった(爆笑)。私は、その幹部に対してすぐに「電話をしてあげなさい。きっと悩んでいるはずだから」(大笑い)と、連絡をとってもらった。\n「きょうは、世田谷にあまりに立派な大講堂ができたので、たぶん諸天善神も気が動転してしまって(大笑い)、うれしいやら驚くやら、喜びの涙を流したりしているんでしょう。だから、がっかりしないで、安心してください」と伝言を託した。悩みを取り除いてあげることが、指導者の役目ですから(大笑い、大拍手)。\n前日のうちにちゃんと天気予報でも見て、降水確率がどれくらいかを確かめてから言えばよかったものを(大笑い)。それもできないほど、皆さまを迎える準備に奔走していたのであろう。私も主催者側の一人として出席した。ともあれ、「全国の青年部の諸君、また世田谷の皆さま、おめでとう」と心から祝福申し上げたい(大拍手)。\n一、さて、三十一年前の昭和三十二年八月十八日、北海道の第一回体育大会が札幌で開かれた。戸田先生は、逝去の約八カ月前でお体も大変であったが、この大会に出席され、青年への期待を込めて、次のように激励された。\n「初代の会長は、青年が大好きだった。私も青年が大好きです。おおいにたのもとしている」と。これが第一声であった。\n戸田先生の言葉は、「社会」と「人生」の正しき軌道を明示した仏法哲理に基づいて、青年達の限りない成長と幸福を願われての「慈愛」の発露であった。\n戸田先生は、続けて言われた。\n「皆さんの双肩には、東洋の青年の指導者として、人材として立っていく任務がかかっている。きょう、北海道の青年の姿を見て、人材として立っていくたのもしさを感じている。日本民衆の先駆けとして立っていくことを願って、私の訓示にかえる」と。\nもし戸田先生、牧口先生が本日のこの席におられて諸君の姿を見られたならば「いやー、すごいな」「うれしいな、うれしいな」と、どれほどお喜びになられることか。\nそのような光景を心に描きながら、牧口先生、戸田先生の「魂」を私の「心」に入れて、諸君を慈しみ、守り、そして未来に期待し、一切を託す思いでお話したい。\n一、戸田先生は、実にさまざまな逸話や譬えを通し、私どもに仏法の道理を分かりやすく教えてくださった。私はその一つ一つを胸中に刻み、誰よりも真剣に戦い学んだ。\n若き日々を、恩師のもとで、一日一日、一瞬一瞬、自身の成長の糧としてきた。また純白な心のカンバスを、恩師の教えで染めぬく実践の日々であった。\nそのなかで、先生はよく、一切をよりよく変化させゆく妙法の無限の力用の譬えとして、病原菌と戦う「白血球」の話をされていた。\nそのお話のごとく、白血球の一種である「リンパ球」は、次々と体内に侵入してくる有害なバクテリアやウイルスと、熾烈な「戦い」を繰り広げている。リンパ球がこの「戦い」に負けてしまえば、人体は病原菌に侵され、死に至ることもある。リンパ球ゆえに一瞬たりとも、しかも体を守るために戦うべき「敵」の種類は、あまりにも多い。いわば人間の身体、そして生命それ自体が、外敵との不断の「戦い」によって支えられているわけである。\nこのことに関連して、昨年、ノーベル生理学・医学賞を受賞した利根川進博士の研究が、興味深い事実を解明している。すなわち、生命体のもつ「免疫」のシステムでは、遺伝子レベルの変化によって、「抗体」をつくり出し、その体内に入ってきた異物を取り込んでしまうことができるという。したがって、たとえば宇宙ではじめて出あうような未知の外敵にも、即座に対処する力があるともいわれる。それはまさに、「限りなき生命の可能性」を示す一つの証左といってよい。\n一、次元は異なるが、私どもの人生、生活、そして広布の前進も、激しい「変化」の連続である。そこには思いもよらぬ障害、障魔との「戦い」が次から次へと待ちうけている。これは、御書に繰り返し述べられている通りである。\nしかし、一切の不幸と苦悩を打開しゆく「根源の法」たる妙法を信受した諸君である。朗々と題目を唱え、胸中に仏界の生命を涌現していくならば、自己の無限の力と可能性をひき出していける。あらゆる苦難を乗り越えていけるにちがいない。どうか諸君は、大確信に立って、いかなる強敵にも微動だにせず悠々と乗り越えていく「幸福の王者」「信仰の勇者」へと育たれんことを、心から念願する(大拍手)。\n&quot;精神の原動力&quot; 失った物質文明\n一、ところで、ヨーロッパを代表する美術史家であり、またすぐれた哲学者でもあるフランスのルネ・ユイグ氏は、深い理解と尊敬で結ばれたかけがえのない友人の一人である。氏は今年八十二歳。ますますお元気に、精力的な仕事をしておられる。この五月三日にパリで開幕する「永遠の日本の名宝展」ならびに私の写真展にも、さまざまに協力を寄せてくださっている。ちなみに氏の誕生日は、この記念すべき「5・3」である(拍手)。\nもともとユイグ氏に会うことを私にすすめられたのは、故アーノルド・トインビー博士であった。博士はユイグ氏をはじめ、ローマクラブの故アウレリオ・ペッチェイ会長など二十人の方々に会うことをすすめてくださったが、多忙でまだお会いできていない方もいる。\nさて、ユイグ氏は、私との対談集「闇は暁を求めて」のなかで次のような趣旨を述べている。\n&quot;物質文明に覆われている現代においては、「自分の人生に対する責任」という概念は消滅してしまった。今や人間は、一人で自分の欲望と向きあって、快楽の満足だけを目指している。人々は当座のことにのみ追われており、「なんのため」とその存在の意味を問うこともなくなり、生命の原動力を失ってしまった&quot;――と。\nつまり、人間を限りなく高め、向上させゆく &quot;精神の推進力&quot; が、現代文明から失われつつあることを憂慮されているのである。\nたしかに、享楽と欲望に流される現代人の営みのなかにあっては、人間は &quot;何のため&quot; に生まれたのか。また政治、経済、科学といった人間の営みは &quot;何のため&quot; にあるのか――。こうした最も根源的な問いかけはもはや、なされなくなりつつある。\nユイグ氏はその重要な背景として、従来の「因果論」を説く、いわゆる既成宗教が現代人の眼には &quot;時代遅れ&quot; と映り、人々の「心」をとらえられなくなった点を挙げられている。\nそしてユイグ氏は、こうした意味から生命の大いなる「飛躍」と「蘇生」の源泉として、仏法、なかんずく私どもの運動に、心からの期待を寄せられている。真剣に時代を憂うる超一流の人物の眼には、私どもの重大な使命が、あまりにも、はっきりと見えているのであろうか。\n一、問題は、正しき「生命の因果」を、一体、誰が教えてくれるのか。そこに、生命の大法を説き明かした法華経の教え、現在においては日蓮大聖人の正法を、誰よきにつけあしきにつけ宗教の力はまことに大きい。\n大聖人は「開目抄」において、仏法と他の哲学を比較されて「外典・外道の四聖・三仙(中略)其の名は賢なりといえども実に因果を弁ざる事嬰児のごとし」(御書一八八ペ)と厳しく指摘されている。\n四聖・三仙といえば、外道の最高峰といってよい。――といっても、何がすごいのか、よく分からない(爆笑)という人のために、特別に(大笑い)分かりやすく現代的に、そのイメージを言えば(大笑い)、ノーベル賞なら十や二十、独りじめ(爆笑)するような大学者であり、あらゆる人々から尊敬されている、諸学問の祖ともいうべき賢者である。\n四聖とは、師弟の道を明らかにした四人のことで、尹寿・務成・呂尚(太公望のこと)、三仙とは、老子を指す。三仙とは、迦毘羅・漚樓僧法・勒沙婆の三人である。何だか舌をかみそうな名前だが(爆笑)、それぞれ「因果」についての独自の説を主張した。しかし結論していえば、それらは、みな仏法の初門もしらない偏見に執着したものである。\n――どんな大学者であれ、有名人であれ、財力、権力の人であれ、にもかかわらず、心おごれる余り、この根本の重大事について、真剣に、また謙虚に求めていかないとしたら、あまりにも愚かであり、残念なことである。その錯誤は、永遠にわたる生命の軌道に決定的ともいえる狂いを生じさせていくからだ。\n大聖人は、ある邪見の僧に対し「一期の大慢を以て永劫の迷因を殖ること勿れ」(御書一八五ペ)――(短い)今世における大増上慢によって、未来永劫に迷い苦しむ因を植えつけてはならない――と大慈悲をもって破折されている。\nこれに対し、諸君は、若くして、この深遠な生命の法理を学び、行じている。そして、あらゆる人々に大法を教えていく立場である。この光輝ある重大な使命に、いやまして、深き自覚と誇りを持つべきである。\n一、「生命の因果」「人生の幸・不幸」――これらについて人が真剣に考え始めるのは、多くの場合、自身が切実な不幸にあった時ではないだろうか。何ごともない安穏な時には、なかなか人生の重大事には思いいたらない。その意味でも、苦難こそ、より深き人生への大切なステップなのである。\n裏返せば、それが不幸を感じる場合が人生には、あまりにも多い。幸福そうに見える生活も、何らかの苦難なき人生など、ありえない。たとえば、経験を積み、年輪を重ねるほど、ありありと見えてくる。たとえば、祝福されて結婚しても、子供が病気で生まれてくる。経済が行き詰まる。火事や事故、離婚や一家の不和、人間関係のもつれなどで、生涯苦しむ場合もある。\nまた、ある高名な方で八十を過ぎ、功なり名をとげてから、最後は夫妻で焼死したケースさえある。まさに凡夫には一寸先は闇である。不幸など自分には関係ないことだ等と断言できる人は、いないであろう。平穏無事なら無事で、年齢とともに、むなしさがつのってくる。忙しそうに充実して動いているようであっても、自分を見つめることができず、さびしさ、わびしさから逃げ続けているにすぎない人もいる。笑顔の底に悲しみがある。楽しさの後を空虚さが追う。苦しみ、悩み――それが避けられない人生の現実である。\nしかし、それでも人間は生き続けていかなければならない。どう苦しみを真実の歓喜へと変えていかれるのか……。この万人にとって最大にして根本の課題を解決したのが大聖人の仏法なのである。\n苦難もすべて「仏の慈悲」と確信\n一、それでは、正法の信仰によって何が変わるのか。\n仏法では苦悩の原因を過去の罪障とする。この悪因をどのように転換しゆくかに、法の高低浅深があらわれる。\nその詳しい論議は、時間の都合上、略させていただくが、大聖人の仏法は「本因妙」の仏法である。すなわち仏となる根本の &quot;因&quot; を妙法蓮華経と明かされ、ただ一念からみれば、この大法を受持した以上、もはや罪障も「因行」も「果徳」もすべて今世で得ていかれると教えられた画期的な大法である。\n総本山第六十五世日淳上人は、青年時代の論文の中で、こう述べられている。\n「現在を苦しいと見ている間は、仏の光に照らされた時には、もはや罪障ではなくて仏の慈悲である。妙法を信じ御本仏の慈悲に浴する私達にとっては、災難はもう災難でない。不運も不運でない。みんな仏の慈悲である」と。\nまた「妙法の行者にとっては、短命も尚寿命である」と。\nまことに納得できる素晴らしい御指南であると思う。また、そうでなければ真実の仏法とはいえない。\nただし日淳上人は、このあと「かくいふは理論である」と述べられ、「一心に只仏を祈ること、それでいいのである」と仰せになっている。何よりも大切なのは、微動だにしない「信心」の実践であると。\n日淳上人はまた別の論文で、こう書かれている。\n「(大聖人)は『苦を苦と悟り楽を楽ととって一心に仏を見る心持で妙法を唱え、そうして強く生きなくてはならぬ。世法の外に仏法はない仏法の外に世法はない。尤も円満な而も正しい生活を送る人が、とりもなおさず仏になり得るのである』と仰せられた。末法の我々衆生の生活を真にかみわけ充分に理解して導きの手を御示しになったのは日蓮大聖人の他にない」と。\n苦しみにつけ、喜びにつけ、一心にただ一生成仏を願い、妙法を唱えていく。何があろうとも、そのたびごとに一歩また一歩、強き心で広宣流布へと勇んで進んでいく。その強盛なる「信心」を貫く人こそ、瞬間、瞬間、かぎりなく御本尊の大慈悲に生命が包まれゆく人である。\n「本因妙の仏法」の、この素晴らしき醍醐味を、日淳上人は教えてくださっているると拝される。\n一、「罪障」といっても、凡夫には、過去世のことは自覚できない。目にも見えない。手にとることもできない。\n五年でわからない場合もある。十年でわかってくる場合もある。また三世という永遠の観点から見れば、すべてが御仏智なのである。目先にとらわれた皮相的見方の青年であってはならない。\n一、「転重軽受」の法門がある。この法門もまた、苦難が仏の慈悲であることを、教えられていると拝される。\n大聖人は、障魔との戦いの渦中にあった池上兄弟に対し、次のように激励されている。\n「今生に正法を行ずる功徳・強盛なれば未来の大苦をまねぎこして少苦に値り」(御書一〇八三ペ)――今世において正法を行ずる功徳が強く盛んであるため、(本来であれば地獄に堕ちるべき)未来の大苦を、今世のうちにこうして少苦にあうのである――と。\n正法護持の功徳、すなわち「護法の功徳力」によって、未来に大苦を受けるはずの重い宿業を転じ、現世に軽く受けていく。この「転重軽受」の法理を、よくよく確信しきっていかなければならない。\n大聖人は、障魔との戦いの渦中にあった池上兄弟に対し、次のように激励されている。\nつまり、あえて様々な難にあうことによって、かりに事故にあっても、もっとひどい未来の大事故を未然に、軽く受けたという場合もあるであろう。他にも同様のケースは数限りなくある。\nまた更に、ここから、三世永遠の生命観に立った「難の意義」も明瞭になる。たとえば、ある程度、そうした実相は感じとれるものである。\nこの「開目抄」「佐渡御書」で、御自身の御立場に即して仰せになっておられる「転重軽受の法門」また「護法の功徳力」について、大聖人は佐渡流罪中の御自身の御姿に即して仰せになっておられる。\nつまり、もったいなくも大聖人は、示同凡夫の御立場から、御自身が大難を受けておられる御姿を通して、末法万年の門下のために、&quot;なぜ難にあうのか&quot; を示してくださっている。\nそして、&quot;難を乗り越える信心&quot; を教えてくださっている。この一点は、人生においても、広布においても、要となる御指南であると確信する。\n「不屈の魂」を永遠の歴史に刻め\n一、昨日、ソ連対文連のイワノフ第一副議長と、種々懇談した。私は、政治・経済体制や思想・信条の違いを超え、同じ「人間」としての立場から、あらゆる国の人々と会い、友好の対話を重ねている。それが私の信念でもある。\nモスクワ大学のログノフ総長とも何度も語り合った。総長は「場の量子理論」「素粒子」を専門とする世界的な物理学者である。昨年秋、来日した折にも、京都大学や早稲田大学等で学術講演をするなど、自らの研究とともに世界の多くの大学との交流に尽力されている。\n一、先日、ソ連で、ログノフ総長との対談集「第三の虹の橋――人間と平和の探究」のロシア語版が発刊された。その書評が、ソ連の新聞や雑誌に掲載されるなど大きな反響を呼んでいるという。\nこの対談集も、人類の未来のために何らかの示唆ともなれば、との願いで発刊されたものである。私は、同総長と「平和」と「文化」、そして「人間」「哲学」「科学」などについて、幅広く論じ合った。\nまた、創価大学の創立者・ロモノーソフの思想と行動の中には、モスクワ大学の輝かしい伝統、なかんずく創立者・ロモノーソフの精神が脈打っていることを知り、深い感銘を覚えた。\n一、ロモノーソフ(一七一一~六五)は、十八世紀、ロシアの大科学者であった。物理学、化学、地理学、天文学、地質学、鉱物学など、その研究活動は幅広い。\n彼は、フランスの化学者・ラボアジエ(一七四三~九四)に先立って、「質量不変の法則」を確立したとも評価され、更にドイツに留学して文学、歴史学の分野でも大きな業績を残している。\nロモノーソフは、白海沿岸の貧しい漁村の貧しい家庭に生まれた。十九歳の時、モスクワに出て、苦学を続け、更にドイツに留学して学問を修めている。貧しい家に生まれたことだけで、教育を受ける機会は、貴族階級に限られていた。しかし、彼は苦学を続け、ロモノーソフの青春は、苦闘の連続だった。しかし、彼は苦学を続け、ついに科学者として大成する。\nそして、未来の青年達に「ロシアの大地から多くのプラトンたち、また優秀なニュートンたちが生まれるだろう」との希望と確信を託して、一七五五年にモスクワ大学を創立したのである。\n一、しかし当初は、大学の校舎も木造の小さな家屋だったという。ロモノーソフは、貧しく、苦学した。それだけに「科学は、すべての者にそれを獲得する自由が与えられているので自由な〈科学〉と呼ばれている」「郊外の農民や不自由な人々にも大学で学ぶ必要がある」(世界教育史研究会編「世界教育史大系15 ロシア・ソビエト教育史I」講談社)と述べている。\nまた彼は、大学の付属学校も開校し、教育の場を広く民衆に開いた。モスクワ大学は、正式には「ロモノーソフ記念モスクワ国立大学」と称される。創立者・ロモノーソフを誇りとして、大学の名に彼の名前を冠している。まさしく創立の精神、創立の心は、二百年の歳月を超えて、今なお大きな実を結び、同大学から多くの優秀な人材を輩出するまでになっている。\n一、今から約四十年前の入信直後のことである。当時の世間は、学会の存在など誰人も知らなかった。そして、未来の青年達に「ロシアの大地から多くのプラトンたち、また優秀なニュートンたちが生まれるだろう」との希望と確信を託して、一七五五年にモスクワ大学を創立したのである。\nまた戸田先生は「大作、学会の本当の偉大さが分かるのは二百年後だ。二百年先まで考えて、広布の盤石な路線を作っておくのだ」ともよく話されていた。モスクワ大学は、創立の精神を受け継ぎ、二百年の歳月を経て、世界一流の大学として開花している。\n「そうだな。必ず出るよ。広宣流布をしているのだから」と言われた。先生は、うれしそうに、まさにその通りとなった。\n戸田先生が常々「二百年後、二百年後」といわれていた意義も明白となるであろう。今はその過程の時代である。\n一、さて私は、しばしば、先日も、ある方から新刊の書物をいただき、さっそく一読し、深く胸に迫る感動を禁じえなかった。アメリカの著名なジャーナリスト・ソールズベリーの「長征――語られざる真実」(岡本隆三監訳、時事通信社刊)という本である。\n長征――その偉大な足跡については、私も、青春の日に詳しく学んだ。若き革命児の一人として、当然、学んでおくべき歴史であったし、また青年リーダーとして、誰よりも深く掘りさげ、身につけるべきであると実感していた。戸田先生とも、長征をめぐり、種々、語ったことが懐かしい。\nソールズベリーは、この本の執筆にあたって、徹底的な取材・調査を行っている。たとえば、「長征」のほぼ全行程を、彼は自ら踏破した。本書の随所に見られる生き生きとした叙述は、こうした著者の「事実」に対する峻厳な姿勢から生まれたものであろう。これが、ジャーナリストの真の在り方といってよい。\n広布長征の完結を諸君で\n一、周恩来首相・鄧穎超女史ご夫妻は、私の長年の友人である。このお二人をはじめ、中国の最高指導者の多くは、この「長征」に参加している。\nこうした方々は、この、すさまじいまでの労苦を経験し、いわば、それを人格の &quot;滋養&quot; とされてきた。青春時代に苦労した人こそ、最も指導者の資格をもっているといってよい。\n中日友好協会の会長を務められた故・廖承志氏も、長征に加わった一人である。かつて北京でお会いした折、私が高齢の氏の健康を気づかった時、廖氏は「私たちのように長征に参加した人は、体のどこかがおかしくなっている」と話されていた。それほど、長征とは壮絶なる戦いであった。今も、その一言は、鮮烈に、私の胸に刻まれている。\n一、いうまでもなく「長征」とは、国民党の勢力に包囲された中国共産党の紅軍が、新たな根拠地を求めて行った大遠征のことである。\nその距離は、江西省・瑞金から陝西省・延安に至る、約一万二千五百キロに及んだ。日本列島の長さが約三千キロといわれるから、そのおよそ四倍に当たる。まさに「二十世紀の奇跡」とされるにふさわしい、歴史的な偉業であった。\n一、長征が行われたのは、一九三四年(昭和九年)から一九三六年(昭和十一年)の、約二年間である。ただし、主力の第一方面軍は、一九三五年に遠征を終えていた。\nこの長遠な行軍が開始された昭和九年といえば、私は六歳。少々、古い呼び方になるが、&quot;尋常小学校&quot;(笑い)に入学した年である。残念ながら、まだ諸君は生まれていない(笑い)。\nまた、この年には、我が学会においても、地方会員の組織化が進むなど、広布の活動に新たな展開が見られた。牧口先生の「創価教育学体系」全四巻が完成し、戸田先生の日本正学館が設立されたのも、この年である。今日の「発展」も、人知れず、このころに開始されていた――。\n一、中国の長征が終わった翌年の一九三七年には、蘆溝橋事件が勃発。日本は、中国侵略の泥沼に入り、軍国主義の &quot;狂気&quot; が一気にエスカレートしていく。日本は、ひたすら、破滅への坂を転がり落ちていく。\nそうした狂った世相にあって、牧口先生、戸田先生が、真っ向から軍国主義と戦い、国家神道と戦ったことは、諸君がよくご存じの通りである。学会は大弾圧を受け、壊滅状態となる。\nしかし、この苦難の歴史こそ、一大平和勢力としての学会の不動の「原点」となっていく。まことに多くが、途中で死亡し、また脱落していった。それほど紅軍の遠征は、あらゆる種類の障害と苦難に満ちていたといわねばならない。\nまず第一に、自然は、あくまでも過酷であった。\n彼らが渡った河川は二十四、越えた山々は一千(ソールズベリー)。しかも、川も山も、日本のようにスケールの小さなものではない。彼らは、道なき道にも挑み、未知の奥地へと踏み込んでいった。\n第二に、敵の軍隊はどこまでも追撃の手をゆるめず、容赦なく襲ってきた。空からも、敵機の来襲が相次いだ。第三に、紅軍内部にも、絶え間なく裏切りや分裂の策動があった。周恩来首相は、のちにこの長征を振り返り「最も暗黒な時代」であったと述べている。\nしかし彼は続けていう――「それでも、われわれは生きのびた」(ディック・ウィルソン「周恩来」=田中恭子・立花丈平訳、時事通信社)と。\n一、長征は、いわば &quot;死&quot; と &quot;絶望&quot; の淵に立った、苦渋と険難の行軍であった。しかし、紅軍は、最悪ともいえる数々の障害をはねのけ、見事に目標に到達した。ソールズベリーは言う。長征とは「危機一髪の敗北と災厄が次から次へと襲ってきた闘いを生き延びた人間の凱歌であった」。\nこの「凱歌」が、その後の中国の歩みのなかで、どれほど重要な意義をもったかは、計り知れない。\n極限ともいえる苦難に負けることなく、逆境のなかを戦い、生き抜いた不屈の「魂」。これこそ、その後の抗日戦争を「勝利」とし、新中国建設という「栄光」をもたらしたものにほかならない。厳しい環境のなかで磨かれ、鍛え上げられた強靱な「魂」が、歴史の新たな舞台を開く &quot;源泉&quot; となったのである。\n一、戸田先生のもとで学んだホール・ケインの小説「永遠の都」に、次の件がある。\n「常に断崖の縁を歩いてきません」(新庄哲夫訳、潮文庫)。以前にも紹介したことがあるが、忘れられない言葉である。\n私も、「常に断崖の縁を歩いてきた」一人であると思っている。魔の軍勢との闘争は、つねに総力戦であり、ギリギリの戦いであった。ゆえに私は、どんなことにもたじろぐことはない。その壮烈な激戦の渦中を進んできたがゆえに、いわんや世界を舞台にした &quot;広布の長征&quot; は、一つの世代によって実現できるものではない。世代から世代へと、広布の理想と確信が受け継がれ、たゆまない不屈の実践が継承されてこそ可能となる。\nいわんや世界を舞台にした &quot;広布の長征&quot; は、一つの世代によって実現できるものではない。\n一、戸田先生は晩年、学会の未来の姿をはるかに展望されながら、しみじみといわれた。\n&quot;学会は、人類の「平和」と「文化」の中核として、必ず不可欠の存在となるだろう。しかし、私の生きているうちには、そのような時代はこないだろう。それも後半生の終わりごろからだろう&quot; と。\n険路に挑み人類の宿命転換へ\n一、信心の功徳とは、生命の境涯を、限りなく深め、高めていくこととも言える。妙法を受持した人の境涯の一端について、法華経の開経・無量義経の経文に即しつつ、次のように語ってくださった。\n第一に、「煩悩ありと雖も煩悩なきが如く」(妙法蓮華経並開結一〇二ペ。以下同じ)――煩悩をなくすのではない。煩悩があっても、なきがごとく、悩まされることがないのである。\n第二に、「生死に出入すれども怖れざる想なけん」――また生命の問題、生きるとか死ぬとかいう問題に対して、恐れというものをもたない。\n第三に、「諸の衆生に於いて憐愍の心を生じ」――みなをかわいそうに思う。学会の精神である。\n第四に、「一切の法に於いて勇健の想を得ん」――あらゆる現象界において、なんら恐れるところなく、その現象と戦いうるようになってくる。\n第五に、「壮なる力士の諸有の重き者を能く担い能く持つが如く」――非常に強い力士が、重い物を背負っても悠然と歩いていけるように、この御本尊をたもつ者は、悠々と世の中を渡っていける。\n第六に、「能く無上菩提の重き宝を荷い、衆生を担負して生死の道を出す」――すなわち無上菩提の宝である妙法を受持し、仏になることができる。そういう大きな宝を背負って、あらゆる衆生を救おうという、またあらゆる衆生に頼られて、堂々と衆生を救っていける境涯になる。\n一、戸田先生が講義された通り、妙法受持の人は、無量の「知恵」と「慈悲」、「勇気」と「力」を備えた大境涯を開いていける。私どもの胸中の境涯を限りなく高め、社会へ、世界へと進みゆく、人類にとって初めての遠征であり壮挙なのである。\nそして、もう一方で、「広布の長征」は、一つには、この、我が胸中の境涯を限りなく高め、開いていく &quot;自己向上&quot; の旅路である。\n一、さて、ソールズベリーは、長征でさしかかった大雪山の難所。そのなかで戦う医療班の青年達。彼らは、&quot;病に倒れた同志を見たら、助けてともに山を越えよう&quot; と懸命に、大雪山の山中を何度も往復しながら駆けずり回っていた。\n傷つき、病にふす同志達を絶対に見捨てるわけにはいかない。目的を成就するまで、ともに生き、進んでいこうと励ます同志達。それは、我々の &quot;広布の長征&quot; でいえば、ドクター部や白樺グループ(会)の人々の活躍に当たるといえよう。\n一、また、長征の本隊の盾となって、守りの「残留」の使命に、黙々と徹した人々もいた。その中で敵に捕らわれた人々には、銃殺刑が待っていた。しかし「われ、獄中にありても闘士なり」と叫びきって死んでいった壮年の姿もあった。まさに、自らの使命と信念に生きぬく勇者の気概である。我が学会の壮年部もこれぐらいの気概で進みたいものである。\n更に、貧しい農家の出身で、十八歳の時、この長征に参加した青年がいる。彼は、五十年後の今日、次のように淡々と語っていたという。\n「一つひとつ山を越えていったのですが、(私は)全部の山を越すことなどできないと思いました」と。これは、長征に参加した多くの青年達の思いであったという。\n彼らは、自分達が生きて目的地に到達できるとは期待していなかった。おそらく途中で力尽き、死んでしまうかもしれない。しかし、&quot;中国の民を救おう&quot; &quot;平和な祖国を築こう&quot; 。もし自分達が倒れても、命を賭して悔いないこの革命の理想は、必ず未来の青年が受け継いで実現してくれるにちがいないと固く信じていた。この信念が彼らの強さであった。\nまさに絶する苦難の長征をやり遂げ、新中国の建設を成し遂げることができた。\n一、戸田先生はよく次のように言われた。\n「生命を、幸福へ向かわせる仏の住み家とするか、逆に不幸へと向かわせる魔の住所とするか、どちらか一方をとらなければならない」と。また「すすんで魔の働きをかり出し、これを退治してこそ幸福と広宣流布とがある」と。\nこれもまた、先駆者・牧口先生の透徹した信心をしのばせる正しき指導である。\n一、三年前の秋、私は十日間、入院した。はじめてのことである。しかし客観的には、いつ倒れても決して不思議ではなかった。入信以来、四十年間、また戸田先生の遺志を継いで、三十年近く、走りに走ってきたからだ。\n&quot;三十までしか生きられない&quot; といわれた弱い体で、働きぬいてきた。走りに走ってきた。つねに嵐と戦ってきた――。\n入院の件はマスコミ等でも大きく報じられた。あらぬ憶測や、利害や思惑がらみの姑息な動きも数多くあった。しかし私は、それらのさざ波を達観していた。もう一度、真の総仕上げを開始すべき &quot;時&quot; を教えてくださったと確信した。\n私は、この病は、仏の大慈悲であると深く実感していた。今こそ、本当のものを語っておこう。教え、残しきっておかなければならない――と。後世のためにも、本格的に、あらゆる角度からの指導を、教え、残しきっておかなければならない。そして創価学会の真実を、その偉大なる意義と精神を伝えきっておかなければならない――と。\nそれまで、学会も盤石にしたし、教えるべきことは教えたとも考えていた。しかし、この病気を契機として、私はこれまでの十倍、二十倍の指導を残そう。\n一、ともあれ、これから諸君の人生にあっても、大なり小なり、苦労と苦難は避けられない。しかし、すべては諸君を大樹へと育てゆく仏の大慈悲であると確信してもらいたい。\nそのことを確信し、堂々と一切を乗り越え、難あるごとに、いよいよたくましく、いよいよ朗らかに人生と広布を開いていく(大拍手)。これからも走っていく(大拍手)。そして、以前以上に、いやまして真剣に走り始めた。これからも諸君の仕事をしよう、と決意した(大拍手)。\n十倍、二十倍の真剣に走り始めた。\n一、確かに仏法は、仏と魔との戦いである。牧口先生は、よく次のように言われていたという。\n「生命を、幸福へ向かわせる仏の住み家とするか、逆に不幸へと向かわせる魔の住所とするか、どちらか一方をとらなければならない」。また「すすんで魔の働きをかり出し、これを退治してこそ幸福と広宣流布とがある」と。\nこれもまた、先駆者・牧口先生の透徹した信心をしのばせる正しき指導である。\nこの戸田先生の予見通り、今や、赫々たる広布の歴史と、一つの「黄金の時代」を築き上げることができた。\nしかし、これからは私が信頼する、若き諸君達の舞台である。広布の未来を、心からの思いを込めて諸君に託したい。それが歴史の必然でもある。どうか、諸君は、いつまでも健康で、思う存分の活躍をしていただきたい。永遠の歴史に残りゆく「広宣流布の長征」の完結へのバトンタッチをお願いしたいと申し上げ、私のスピーチを終わりたい(大拍手)。"},
  {id:"e1989",date:"1989年7月14日",title:"新しき天地を新しき勇気で",subtitle:"第19回本部幹部会 / 東京池田記念講堂（世田谷・用賀）",author:"池田大作先生",publication:"聖教新聞",summary:"1989年7月14日、世田谷・用賀の東京池田記念講堂で開催された第19回本部幹部会でのスピーチ。『聖愚問答抄』を拝し、対話の妙、人の心の変化、そしてフランス革命200周年の日に合わせてバスチーユ襲撃の象徴的意義を語られた名スピーチ。「我が内なるバスチーユに挑め」との呼びかけは、勇気なくして勝利なしとの永遠のメッセージである。",body:"1989年7月14日　＠東京池田記念講堂\n第19回本部幹部会\n～新しき天地を新しき勇気で～\n　一、ここ世田谷の東京池田記念講堂での本部幹部会は初めてのことである。 今日は、アメリカ、イタリアなど海外19ヶ国・地域の皆さまも参加されている。有意義にして晴れやかな幹部会の開催を祝福申し上げたい。\n　はじめに、伊豆東部の沿岸地域では、地震のため被害が出ている。この席をお借りし、皆さまを代表して心からお見舞い申し上げたい。\n　一、今日は、まず御書の『聖愚問答抄』を拝して話を進めたい。\n　同抄は、私も若き日に、繰り返し繰り返し拝読し、心肝に染めた御抄である。しかし長文の御書でもあり、少々難しいかなとも思ってきたが、地元のある最高 幹部の話によれば、どうやら世田谷の方々は違うようである（笑い＆大拍手）。\n　第一線の皆さまのほうが総じて理解が深く、真剣に話を聞く。かえって幹部の方々のほうが、多忙のため疲れて話がわからず、途中で居眠りをしたりする（爆 笑）というのである。\n　真偽はともあれ、未来を担う若き指導者、そして後世の幾百万の人々のためにも、言うべきことは、きちんと言い残しておきたいと思う。\n　一、『聖愚問答抄』は、題号の通り、「聖人」と「愚人」の一対一の問答・対話を中心として展開された御書である。\n　「愚人」とは、末法凡愚の衆生を表し、それに対し「聖人」は、日蓮大聖人のお立場を示していると拝される。\n　さて、「愚人」は、「聖人」に巡り会い、その言葉に耳を傾けるが、小乗・権教に対する「聖人」の峻厳な破折を聞き、いささか感情的になる。\n　「爰(ここ)に愚人　色を作(な)して云く　汝　賤(いやし)き身を以て　恣(ほしいまま)に莠言(ゆうげん)を吐く」（御書481ページ）\n　――この時、愚人は顔色を変えて言う。“汝は卑しい身でありながら、ほしいままに悪言を吐く”と――。\n　これに対し、「聖人」は、あくまで冷静である。\n　「汝が言　然(しか)なり」（同）\n　――あなたがそう言うのも、もっともである――と、まことに懐深く受け止められている。\n　正法正義に様々な暴言・悪口があるのは、御書・経文に照らして必然である。それに対しては、厳然と反論し、論駁していく強さがなくてはならない。しか し、強さだけですべての人を、心から納得させることはできない。むしろ、相手の主張も柔らかに受け止め、理解を示してこそ、対話はさらに深まり、実り多い ものとなっていく。\n心を包み心を開く「対話」こそ\n　一、重書中の重書である『立正安国論』も対話・問答形式でしたためられた御書である。そこでも、顔色を変えて憤慨し、席を立とうとする「客」に対し、大 聖人のお立場を表す「主人」は「咲(え)み止(とど)めて」（御書24ページ）微笑をたたえ、帰ろうとする客をとどめて――話を続けたとされている。\n　このように、無知や無理解の言葉が投げられ、理不尽な態度があったとしても、一切を莞爾(かんじ)と受け止め、悠々と、自在の対話を続け、納得させてい かれる。ここに、「境涯の芸術」「対話の妙」ともいうべきものが拝されてならない。\n　一、いかなる相手であれ、一切の感情を広く大きく包みながら、どのように心を開き、納得と共感を広げていくか。それはすべて、私ども境涯にかかっている といってもよい。相手の喜怒哀楽に悠々と棹さしながら、自在に心の奥に漕ぎ入って融通無礙の境涯を開いていく以外にない。ここに、対話の人間学の精髄があ る。\n　妙法を唱え、実践されている皆さま方は、無上道を歩まれている方々である。最高無比の境涯を、日々、着実に開いているといってよい。生命に開かれた財は 永遠であり、それからみれば世俗の「財」や「位」など、まことにはかない。その誇りも高く、私どもは堂々と前進してまいりたい。\n　一、『聖愚問答抄』でも、「聖人」は、まず「愚人」の言に十分に耳を傾ける。その上で、真実の正法正義を、法理・道理に則り、諄々と語り尽くしておられ る。\n　その中で「愚人」も「聊(いささ)か和いで」（御書487ページ）――少し顔色を和らげて――というように、徐々に心を開いていく。\n　やがて「席をさり　袂をかいつくろいて」（御書494ページ）――席を下がり、袂を正して――と、態度を改め、「聖人」に真剣に教えを請うようになる。\n　そしてついには、「頭(こうべ)を低(た)れ　手を挙げて」（御書500ページ）――頭を垂れ、掌を合わせて――正法の実践を誓うに至る。\n　末法今時の衆生は、愚癡の衆生である。正理に暗く、仏法を理解する智慧を持たない。それだけに心して対話していきなさいとの御文とも拝される。\n永遠の満足のため今世を\n　一、戸田先生は、よく言われていた。\n　「心の世界は、慈悲深い心で接すれば、いくらでも変化するするということを忘れてはならない。\n　ともかく、心から礼儀正しく、心から粘り強さを持って接していくことが大切である。ここに指導者の本当の姿がある」と。\n　まことに、その通りだと思う。\n　「確信」と「誠意」と「情熱」と「真実」を込めた対話は、必ずや相手の心を揺り動かさずにはおかない。\n　人間の心は複雑である。初めは反発があるかもしれない。表面的にはいろいろな姿を示す場合もある。しかし、真心の対話は、相手の心に何かを与え、何かを 植えつけているものだ。それはいわば、病んだ人に良薬を注射したようなものであり、やがて時とともに、悪意の心を癒し、「理解」と「共鳴」の花を咲かせて いく。“敵”さえも“味方”にしていくことができる。これが信心の力であり、妙法の力なのである。\n　ご存じのように、学会のこれまでの活動も、波が絶え間なく巌に打ち寄せては砕いていくような、「忍耐」と「確信」と「誠実」の「対話」の連続であった。 この粘り強い努力によって、勝利の水かさは増し、今日(こんにち)の大発展の広宣の世界を築くことができた。その皆さま方の功績は永遠に胸中より消え去る ことはない。\n　一、また、『聖愚問答抄』の最後に、日蓮大聖人は、次のように仰せになっている。\n　「聖人云く　人の心は水の器にしたがふが如く　物の性は月の波に動くに似たり、故に汝　当座は信ずといふとも　後日は必ず翻へさん　魔来り鬼来るとも　 騒乱する事なかれ」（御書500ページ）\n　――聖人は言う。人の心は、水が器の形にしたがって変わるようなものであり、物の性質は月影が波に動くのに似ている。ゆえに、あなたは今のところは信ず ると言っても、後日になって必ず心を翻すであろう。しかし、魔が来ても鬼が来ても、決して心を乱してはいけない――と。\n　まことに人間の心というものは移ろいやすい。今は信心を貫き通すと決意していても、それはいつ変わるかわからない。しかし、その弱い自分の心と戦い、最 後の最後まで信心の心を翻さないで、妙法に生き抜いた時、成仏がある。永遠に崩れない幸福境涯を開き、永遠の勝利者となっていくに違いない。\n　だからこそ、過去でも未来でもない今世の、ただ今の信心こそが大事なのである。またそのために私どもの信心の組織がある。\n　一、学会にも様々な障魔が競い、いろいろな出来事があって、皆さま方にご迷惑をおかけしている。まことに申し訳ない限りである。しかし、私どもの信心を 鍛えてくれるものと受け止めていただきたい。私は妙法のために命を捧げている。ゆえに、いかなる難があっても覚悟の上であり、何も恐れはしない。\n　その間に皆さま方が強い強い信心を決定(けつじょう)させていくことを願いたいのである。私がいなくなっても難はあるだろう。その時、これまでせっかく つくりあげた福徳を消し去ってほしくないからである。\n　一、さらに、先の御文に続けて大聖人は「夫れ天魔は仏法をにくむ　外道は内道をきらふ、されば猪の金山を摺り　衆流の海に入り　薪の火を盛んになし　風 の求羅をますが如くせば　豈(あに)好き事にあらずや」（御書500ページ）と仰せである。\n　つまり「天魔は仏法を憎む。外道は内道を嫌う」からこそ、魔の働きは、あらゆる姿・形をとって競い起こる。\n　よく先輩たちが言われてきたように、障魔は、多くの場合、信心と関係のないような世間のことに事寄せて現れてくる。しかも、誰人も想像できないような、 思いもよらないところで出てくるものでもある。\n　だが、競い起こる苦難に対してただ今拝した御書には次のように仰せである。\n　「あたかも、猪が金山をこすっても金山は少しも傷つけられることなく、かえってその輝きをいや増していく（ように）。また、多くの川が大海に流れ入って も、大海はすべてを大きく包み込んでいくし、火も薪を加えることによって勢いがますます盛んになる（ように）。さらに、風が吹けば吹くほど求羅という虫が 成長していくように、いよいよ信心を強盛にしていくならば、まことに望ましいことではないか」と。\n　一、『開目抄』に「山に山をかさね　波に波をたたみ　難に難を加へ　非に非をますべし」――山にまた山を重ねるがごとく、波にまた波をたたむがごとく、 難に難を加え、非に非を増大していく――（御書202ページ）と仰せである。\n　この御文は、別しては日蓮大聖人に、いかに数々の難があったかを述べられたものであるが、総じては私どもの法戦にも、次から次へと障害が襲ってくること を示されたものといってよい。\n　学会のこれまでの歩みをみる時、まさにこの御文のごとく、たたみかけて押し寄せてくるような苦難の連続であった。しかし、こうした嵐に耐え、挑戦し、未 曾有の勝利の軌跡をつくりあげた。\n　大事なことは「魔来り鬼来るとも　騒乱する事なかれ」との仰せのごとく、いかなる事態に当面しても、信心の心だけは破ってはならない。むしろ、あらゆる 苦難を成長への滋養として、自分自身の輝きを増していく、たくましき勇敢な信心であらねばならない。これが信心の証なのだ。\n我が内なるバスチーユに挑め\n　一、今日７月14日は、フランス革命の発端となった「バスチーユ牢獄の襲撃」から、ちょうど200周年の記念日である。本国フランスでも、盛大な記念行 事が行なわれている。\n　フランス、ヨーロッパのみならず、人類の歴史に深く大きな足跡を刻んだフランス革命――。その意義について語るべきことは多い。現在もなお様々な論議が あり、ご承知の通りである。\n　本日は、革命の起点「バスチーユ襲撃」の意義について、一点だけ申し上げておきたい。\n　民衆による「バスチーユ牢獄」の攻略と解放――。この事件は結果的には、実質的な意味よりも、むしろ象徴的な意義が大きかった。民衆の精神に与えた影響 が決定的であった。\n　すなわち、この日、牢獄にいた囚人は何人であったか――。意外なことに、７人しかいなかった。しかも、いわゆる弾圧による“思想犯”等は１人もいない。\n　ただ、バスチーユは、人々にとって、圧政の象徴であった。先祖以来、苦しめられてきた「専政政治」と「バスチーユ」は同義語であった。暗く威圧的にそび えるバスチーユは、悪しき権力の砦として、人々の憎悪に燃える目に映っていた。\n　事実、かつてのバスチーユは恐怖の牢獄であった。罪なき正義の人が次々に犠牲になった。\n　一、それまで恐怖の対象であったバスチーユの権威は、この日、民衆の力によって、完璧に破壊された。正義が勝った。人々は狂喜して晴々とした自由と解放 の空気を吸った。\n　すなわち、バスチーユという権威の「壁」を壊した時、人々が壊したものは、実は、それまでの自分自身の囚われた臆病な“心の壁”だったのである。バス チーユを打ち破った瞬間、民衆は自らの臆病さを打ち破った。そこに、この事件の本質を私はみる。\n　この「心の壁」を破った結果、革命の波は一挙に高まり、沸騰し、奔流のごとく、新時代の広大な天地を走り始めた。「壁」の向こうには、解放された無限の 舞台が待っていた。\n　“この世界は俺たちの世界だ。私たちの世界だ。我々が思う存分、自由に叫び、生き、戦い、変革していいのだ。立ち上がった民衆の自由の乱舞を、誰人もさ えぎることはできない！”――と。\n　一、弱き心の壁を思い切って打ち破った時、そこから「新しい歴史」をつくる「新しい勇敢なる人間」が出現した。\n　勇気なくして前進はない。勇気なくして勝利はない。勇気なきところ正義は力を失い死んでいく。\n　大聖人も「日蓮が弟子等は臆病にては叶うべからず」（御書1282ページ）と強く仰せである。臆病であっては、大聖人の門下とはいえない。\n　人間は人間らしく、信念の人は信念の人らしく、信仰者は信仰者らしく、敢然と、堂々と、我が道を生き抜いていかねばならない。\n　一、何らかの圧迫を受ける。その壁を破ろうとして全力で抵抗する。そこに、生命力は増大する。人間としての成長も、進歩もある。その意味で、圧迫こそ、 自身の新しき可能性を開いてくれるのである。圧迫ゆえの進歩――それが生命の法則である。\n　十の圧迫があれば、こちらも十以上の抵抗の力を出せばよい。百の圧迫の力があれば、百以上の知恵と力を発揮して、打ち勝てばよい。人間の生命には宇宙大 の力が秘められている。\n　何ものにも屈することなく、壁また壁を次々に破りながら、無限に自己を解放し、拡大していく――。ここに仏法者の生き方がある。信心がある。“生命の法 則”に則った、人間の生き方の本道がある。\n　ゆえに、真に強き者は、安逸を嫌い、むしろ進んで圧迫の壁に向かって挑戦する。その道以外に、自身の「自由」も「解放」も「革命」もないことを知ってい るからである。\n「時」は「真実」の最高の証明者\n　一、生命は環境からの圧迫と戦う中で変化し、進歩する。こうした考えを世界で最初に明確に主張したのは、いうまでもなく、イギリスのダーウィンである。 彼の説は、発表当初、世間の袋だたきにあった。各界からのごうごうたる非難――。いつも変わらぬ先駆者の運命であり、また誉れである。\n　その頃の有名なエピソードに、こんな話がある。\n　「進化論」を唱えた『種の起原』の発刊から約半年後、1860年６月のことである。オックスフォード大学の講堂に700人の学者等が集い、ダーウィン説 をめぐって、賛否の討論が激しく繰り広げられた。\n　反対派の代表が、賛成派の代表トーマス・ハクスレーに言った。\n　「自分の祖先がサルだというのなら、それはおじいさんのほうの祖先かね、それともおばあさんのほうの祖先かね」\n　悪意に満ちた、心ない、からかいの言葉であった。真面目な討論を侮辱する発言でもある。\n　ハクスレーは、おもむろに立ち上がると、こう答えた。\n　「もし私が、貧弱で知能が低く、腰をかがめて這い回り、私たちに向かって歯をむき出してキイキイいう動物を祖父に選ぶか、それとも、素晴らしい理性と知 能を持ちながら、控えめな真実の探究者を中傷して、叩きつぶしてしまうために、それらの英知を使うような人を祖父に選ぶか、そのどちらかを取れとお尋ねな らば――」\n　つまり“知能の低いサルか、それとも知能を低劣な目的に悪用する、あなたのような人物か、どちらのほうがいいか”――。\n　ハクスレーはこう問題提起したあと、\n　「このお答えは遠慮させていただきます」（爆笑）と。\n　《ロバート・ジャストロウ『壮大なる宇宙の誕生』集英社》\n　イギリス紳士らしいユーモアの中に、痛烈な皮肉を込めた一言であった。\n　せっかく優れた知性を持ちながら、文化の発展のために真剣に取り組んでいる人をからかい、攻撃するためにだけ、その知能を使う下劣な人間に比べれば、サ ルのほうがまだましですよ――と。\n　今も語り草になっている、有名な史実である。\n　一、これは、わずか百年少し前のことである。現在、ダーウィンの説に対して、部分的な反論や修正はあれ、その基本の考え方を否定する科学者はほとんどい ない。\n　万般において、「時」は、真実の最高の「証明者」であり、「審判者」である。\n　その渦中や中途においては見えなかった真実も、時とともに必ずや明らかになってくる。何が善で、誰が悪であったか。時は複雑に見えたものを明瞭にし、転 倒していたものを正しい位置に戻してくれる。また戻さねばならない。\n　御本仏であられる大聖人でさえ、その偉大さが本格的に世界に知られ始めたのは、つい最近である。長い長い間、誤解と無認識厚い壁に真実は閉じ込められた ままであった。まして、御在世当時はなおさらである。大悪人のごとく憎まれておられた。御本仏でさえ、そういう道を歩まれている。\n　まして私どもは凡夫である。戸田先生はよく「自分自身の人生である。自分自身の信心である。人に褒めてもらうための信心ではないし、そのような根性が、 そもそも間違いである」とおっしゃっていた。「褒められようなんて、相手に媚びるような人間は、私の弟子ではない」と厳しかった。\n常に無限の未来に生き抜け\n　一、「時」と「オックスフォード大学」の話が出たところで、それにちなんで紹介しておきたい。\n　先日、オックスフォード大学を訪問した際、ニール副総長ご夫妻の招待で、副総長の住居にお邪魔した。妻と、創価大学の高松学長らも一緒であった。\n　その際、副総長が学長を兼任されているオール・ソウルズ・カレッジの庭を案内していただいた。\n　構内に、高く並んだ二つの塔があり、日時計が掲げてあった。この有名な時計には、こう記されていると聞いた。\n　「時は消え去る。しかして人に託して、その債を負わしむ」と。\n　つまり、“歳月は人を待たずして歩み去り、消え去る。ゆえに人がもし時を惜しみ、職務に励まざれば、常に時の歩みに遅れ、一生虚しく過ごして終わる。そ れはあたかも、負債を時から担わされるようなものだ”との意味である。\n　一、一生は短い。時を惜しまねばならない。時の迅速な足に遅れることなく、“時とともに”有意義に歩み、“時とともに”汝自身を成長させていくことであ る。\n　人生をつくっている材料――。それは「時」である。一日一日であり、一刻一刻である。ゆえに人生を愛する者は、「時」を大切にしなければならない。\n　そして、充実した「時」の一片一片を集めて、我が人生を素晴らしき“一編の詩”に、また偉大な“一つの伝説”“一つの物語”に、あるいは立派な“一個の 建築”に完成させたならば、その人は幸福である。\n　中でも私どもの人生は、「広宣流布」の完成に向かい、「一生成仏」の完成に向かっての「時」の歩みである。\n　個人的にも社会的にも、そして宇宙的な意味でも、これ以上の価値ある一生はない。また、これ以上の幸福な生涯もないと信ずる。\n　一、ところで、日蓮大聖人は、ある婦人に対し、次のようなお手紙を送られている。\n　「日蓮を こい(恋)しく・をはせば　常に出ずる日　ゆうべに・いづる月を　をが(拝)ませ給え、いつ(何時)となく日月に　かげ(影)を う(浮)かぶる身なり」（御書1325ページ）\n　――日蓮のことを恋しく思われる時は、いつも出る太陽、夕方に出る月を仰いでご覧なさい。私はいつでも太陽や月に影を浮かべている身です――と。\n　これは佐渡の国府尼に対し、“身延と佐渡と遠く離れているようであっても、私はいつもあなたと一緒ですよ”“私は太陽や月に身を浮かべて、あなたを見 守っていますよ”と激励された御文である。\n　この一節には、御本仏の大慈大悲のお心とともに、仏法の壮大な生命観の一端が示されていると拝される。\n　妙法の世界は、美しく温かい“生命の絆”の世界である。この強く深遠な世界に目覚めるならば、太陽や月と語らい、星々の輝きとも共鳴し、大宇宙の営みと 律動しながら、人生を安心しきって生き抜いていける。\n　そしてさらに、自身のみならず、祖先の命も、宇宙の生命に包まれて、永遠なる「幸福」と「満足」の軌道を迷うことなく進んでいけるのである。\n　この妙法によって感得される境涯が、いかに雄大で深遠なものか――。私は、このことを深く確信してやまない。\n　ともあれ、御本尊を受持し、妙法流布への活動に励む私たち自身の信心の如何によって、自己を宇宙大の境涯へと開いていくこともできるし、また今世の人生 を師子王のごとく悠々と生き抜いていくこともできる。そして、どこまでも自分自身の力で最極の幸福の扉を開いていける――。ここに信心の世界の真髄があ る。\n汝の完成へ歩みを止めるな\n　一、私が講演を行なったフランス学士院の会議場に、世界的に有名なフランスの詩人、ラ・フォンテーヌの彫像があった。\n　彼の『寓話』の中に「粉ひきと息子とロバ」という有名な話がある。ここで、そのあらすじを紹介したい。\n　――粉ひきと息子の少年が、二人でロバを売りに出かけた。\n　二人はロバを少しでも高く売ろうと考え、まず、ロバの足を縛って棒にぶら下げ、二人で運んだ。\n　すると人々は、「なんという愚か者だ。人間が動物を運ぶなんて、人間のほうがよっぽどロバ（まぬけ）だ」と笑った。\n　そこで粉ひきは次に、ロバに息子を乗せて歩いた。\n　すると人々は、「老人を歩かせ、いい若い者が楽をするなんて！」と非難した。\n　そこで少年は降りて、今度は粉ひきがロバに乗った。\n　すると娘たちが、「若い息子が疲れて足を引きずって歩いているのに、なんてじいさんだろう！」と愚弄し続けた。\n　そこで、二人ともロバに乗った。\n　すると同じ連中が、「あいつらはどうかしている。ロバがへとへとじゃないか。市場で何を売るつもりだ？」と怒鳴ってやまない。\n　そこで二人とも歩いて、ロバの後についていった。\n　するとある男が「なんてことだ。当世はロバがくつろぎ、人間が骨折るというのか？」とからかう。\n　とうとう粉ひきも悟った。\n　「世間の誰をもすべて満足させようなんて、狂気の沙汰だ。今後はどんなに非難されようが、褒められようが、人があれこれ言おうが言うまいが、俺は俺の考 えに従う」と。そこで、その通りにし、ロバも高く売れた――という物語である。\n　この話の教訓はいうまでもない。確かな自分自身をどう磨き、築いていくか――。ここに幸福な人生を歩む根本の道がある。他人の言に左右され、翻弄される 生き方ほど愚かなものはない、という一点であろう。\n　世間の風評のみにとらわれた生き方は、人生の価値を自らおとしめ、そこには自分自身の真の満足も真の勝利感もないであろう。\n　私どもは、最高の仏法をたもった信仰者である。信仰者は信仰者らしく、学会は学会らしく、「信念」と「誇り」を持って、どこまでも自身の道を堂々と歩ん でいけばよい。人間として最も正しく、幸福な生き方がここにある。私は本日お集まりの皆さまに、このことを強く訴えたい。\n　一、私も1973年に会談したことがあるが、アメリカの細菌学の権威であったルネ・デュボス博士は、こう述べている。\n　「心配のない世界でストレスもひずみもない生活を想像するのは心楽しいことかもしれないが、これは怠け者の夢にすぎない」\n　「遠く穴居の時代から、地球はエデンの園ではなく、生存するためには反発力が必要な決定の谷間だった。地球は憩いの場所ではない。\n　人間は（中略）戦うように選ばれているのだ。危険の真っただ中で伸びていくことこそ、魂の法則であるから、それが人類の宿命なのである」（『健康という 幻想』）と。\n　博士は「人間革命」の理念にも深い共感を寄せてくださっており、自著『内なる神』を届けてくださったが、その扉には、こうしたためてあった。\n　「本著の最後の一行に『ものごとのなりゆきは運命ではない』とあるのは、私が日蓮正宗の教理を人文主義的、科学的に表現したものである」\n　博士は仏法者ではなかった。しかし、苦難に打ち勝つ中で成長を果たしていくのが人間本来の姿であり、人間の意志の力は「運命」をも超えるという信念を持 たれていた。\n　一、また、ゲーテは語っている。「自分の生涯の終末をその発端と結びつけることができる人は、いちばん幸福な人間である」（『ゲーテ全集』「箴言と省 察」）と。自ら決めた初志を貫けるか否か。まさしく、人間の幸不幸と深き価値はそこにあるといってよい。\n　一、初代会長牧口先生は、次のように指導されている。\n　「いかなることがあっても、我々はこれからのことを考えて生きていくことだ」\n　さらに「妙法の生活とは“変毒為薬”である。社会で生活している以上、時には事故や災難、そして事業の失敗などに遭う場合がある。……だが、どんな場合 でも妙法根本、信心根本として、御本尊を疑わず信心に励めば、毒を変じて薬となしていけるのである。\n　例えば、病気をした――。これは罰だと悩んでいるだけでは解決しない。そこで“この病気を必ず変毒為薬してみせるぞ、健康という大福運、大功徳を開くの だ”と確信し、決意して信心を続けていくことが大事だ。\n　その時、病気が治るだけではなく、全快した時には、以前よりも健康になるのが、変毒為薬の妙法である」と。\n　強盛なる信心によって、すべては変毒為薬していける。これが仏法である。信心は「現当二世」である。何があっても、変毒為薬の信心を貫き、常に勝利の大 道を、さらにさらに、開いていけるのである。\n　一、ご存じの通り、経文に照らして広宣流布の途上には様々な苦難がある。皆さま方には大変ご苦労をかけている。しかし、これからも多くの労苦に耐えてい かねばならないであろう。それしか広宣流布の山を一つ一つ登ることはできないからである。\n　皆さま方の益々のご健康とご長寿、そして勇気ある人生を歩んでいかれんことを切にお祈りし、私のスピーチとさせていただく。（大拍手）\n（1989年7月14日＠東京池田記念講堂）\n[資料室]"},
  {id:"e1997",date:"1997年6月22日",title:"平和と文化の大城に凱歌あれ",subtitle:"大東京をリードする世田谷の友に贈る",author:"山本伸一",publication:"聖教新聞",summary:"昭和29年の第一回青年部体育大会「世紀の祭典」の感動から始まる随筆。世田谷区の日大グラウンドで行われた文化祭の情景、鼓笛隊の颯爽とした姿、そして青年への大きな期待が綴られている。",body:"大東京をリードする世田谷の友に贈る\n平和と文化の大城に　凱歌あれ\n山本伸一\n\n　御聖訓に\n　「一切の人は\n　　にくまば　にくめ」\n　日蓮は\n　「いまだ　こりず候」\n　　　\n　我らの信奉する\n　大聖人の悠然たる確信\n　それを思うと\n　わが学会の難は\n　いまだ小さい\n　　　\n　島国根性の\n　嫉妬と策略と陰謀の数々\n　売らんがための作り話で\n　世間を撹乱する　卑しい輩\n　これを　悪世末法というか\n　　　\n　世田谷と聞くと\n　私の脳裏には\n　昭和二十九年の\n　あの秋の十一月七日が蘇る\n　　　\n　第一回の青年部体育大会が\n　「世紀の祭典」と\n　銘打って　行われた\n　世田谷区の\n　日大グラウンドである\n　　　\n　この世紀の大会は\n　三年間　連続で開かれた\n　会場も　同じであった\n　恩師である戸田先生は\n　三回とも　出席してくださった\n　　　\n　その意義は　大きかった\n　わが学会は\n　文化の伝統を創りゆけという\n　深き思いがあったことを\n　私は　知っていた\n　　　\n　青年は　成長する\n　青年は　頼もしい\n　青年には　未来がある\n　青年は　賢い\n　そして\n　青年は　恐れない！\n　　　\n　この青年たちを\n　広宣流布という\n　大文化運動\n　大平和運動の主人公として\n　活躍させることは\n　私の夢であり\n　恩師の夢であった\n　　\n　颯爽と\n　平和の天使　鼓笛隊が\n　文化祭に　初登場したのも\n　ここ　世田谷の会場であった\n　　　\n　青年たちは\n　伸び伸びと\n　また　あらゆる苦労をしながら\n　この文化祭を通して\n　たくましく成長した\n　　　\n　この文化祭を\n　発案したのは　私である\n　多くの先輩たちは\n　こぞって　反対した\n　しかし　戸田先生は\n　深い遠い　展望を考えたとき\n　絶対　必要と\n　ただ一人　賛成された\n　　　\n　その時の青年たちが\n　土台となり\n　今日の　東京第一の\n　世田谷の舞台が　できあがった\n　　　\n　世田谷は\n　文化の街であり\n　教育の街であり\n　東京の模範的な\n　水準の高い街々である\n　　　\n　やがて　世田谷に\n　宝城が完成\n　創立六十周年を\n　記念する会合も　もたれた\n　　　\n　多くの同志が\n　丹精こめて作りあげた\n　華やかな　気品あふれる\n　菊花の競演\n　これも\n　文化運動の一つであった\n　それは　それは\n　素晴らしい　文化の薫りで\n　世田谷城を包んでいた\n　　　\n　私は　深く思った\n　初代会長　二代会長に\n　この晴れの姿を　見せたいと\n　　　\n　そして\n　私は　詠み贈った\n　「創立に\n　　　　勝利の宴や\n　　　　　　　菊花城」\n　　　\n　世田谷の\n　偉大なる先駆者の方々よ！\n　父たちよ　母たちよ！\n\n\n　あまりにも\n　苦しい法戦であったことも\n　よく　私は知っている\n　皆さま方は\n　よく　烈風に耐えた\n　皆さま方は\n　黒い非難　中傷に耐えた\n　　　\n　これが　五濁悪世の姿であると\n　御本仏は　賞賛してくださる\n　　　\n　御聖訓にいわく\n　「日蓮は　日本第一の\n　　ゑせ（僻）ものなり」――\n　日蓮ほど　日本において\n　悪名を流した者はない\n　　　\n　何たる　転倒の世か！\n　何たる　命濁の世か！\n　何たる　狂気の社会か！\n　　　\n　正しいからこそ\n　難を受ける\n　大悪を破るからこそ\n　大善となる"},
  {id:"e2001",date:"2001年5月13日",title:"前進！勇気なくして勝利なし！",subtitle:"随筆 新・人間革命 213 / 新世紀の旗手・世田谷",author:"法悟空",publication:"聖教新聞",summary:"フランス革命のバスチーユの歴史を引きながら、勇気を持って立ち上がることの重要性を訴える随筆。世田谷文化会館の歴史を振り返り、「前進！勇気なくして勝利なし！」との不朽のメッセージが込められている。",body:"新世紀の旗手・世田谷\n前進！　勇気なくして勝利なし！\n\n　われらは勝った！\n　いよいよ、新しき旅立ちの鐘が高らかに鳴った。\n　活発な魂のわれらは、風を頼らない。順風が吹こうが、逆風があろうが、学会は学会らしく、威風堂々、偉大なる目的地に向かって進む。\n　前進！　そこに広宣流布の闘士の魂がある。\n　私は、あの狂乱の「第一次宗門問題」の嵐が吹き荒れた二十余年前も、鉄の鎖を引きずるように、迫害の暴風を突いて前へ進んだ。\n　学会本部にいても、あるいは、第二東京の立川文化会館等にいても、じっとしていられず、時間を見つけては都内を回った。\n　世田谷にも、何度も、何度も足を運んだ。「東京よ、負けるな！　世田谷よ、立ち上がれ！」と祈りながら。\n　特に忘れられないのは、長編詩「青年よ　二十一世紀の広布の山を登れ」を発表して間もない、一九八一年（昭和五十六年）暮れのことである。\n　私は、当時よく利用した学会本部のバスに乗り、皆が喜ぶ顔を思いながら、赤堤の世田谷文化会館へ走った。\n　会館では、年末の“餅つき大会”が行われるという話であったが、私の来訪を聞かれてか、集まった同志は八百人に膨れ上がっていた。\n　お母さんに連れられた子どもたちも、百数十人いただろうか。なんと明るく、にぎやかだったことか！\n　“世田谷家族万歳！　世田谷の未来万歳！”と、皆で記念写真に納まった。\n　　\n　逞しく\n　　　この地　護らむ\n　　　　　拓かんと\n　　世田谷健児の\n　　　　歴史を讃えむ\n　　\n　私が、友に詠み贈った歌である。\n　以来二十年、あの時の子どもたちも凛々しき青年に成長しているにちがいない。\n　　　　　　◇\n　一度、世田谷・用賀の東京記念講堂で本部幹部会を開催したことがあった。\n　一九八九年（平成元年）の七月十四日のことである。\n　確か諸般の事情から、急に“本幹”のメーン会場になったと記憶する。\n　今の衛星中継が始まる前のことで、記念講堂には、世田谷のブロック長、ブロック担当員の皆様方が、音声による“本幹”の中継を聞くために集っておられた。\n　そこへ、突然、私が入ってきたのである。場内を揺るがす拍手と歓声が轟き、後方の人は総立ちになった。\n　地域の最前線で意気揚々と戦う、わが使命の同志の心は熱かった。その響きは、わき上がる民衆革命のどよめきのように思えた。\n　この日は、「フランス革命二百年」の記念日。\n　私は、革命の発端となった「バスチーユ牢獄の襲撃」について語った。\n　一七八九年のその日、民衆がバスチーユを攻撃した時、囚人はわずか七人。しかも、革命の指導者が捕らわれていたわけでもない。\n　しかし、この「バスチーユ襲撃」から、怒濤の大革命が始まったのだ。なぜか。\n　それは、民衆の心が一変したからであった。専制政治の象徴たるバスチーユ打倒は、権力に屈従していた民衆自身の臆病な「心の壁」をも打倒したのである。\n　大勇を奮って「内なる壁」を破った時、一気に自由の舞台が広がっていったのだ。\n　私は強く訴えた。\n　勇気なくして前進なし！\n　勇気なくして勝利なし！\n　日蓮門下は臆病であっては絶対にならない、と。\n　広宣流布とは、正義の永遠闘争である。\n　一つの山を越えれば、また次の新しき山がある。\n　フランスの文豪ロマン・ロランは、有名な革命劇「七月十四日」で叫んだ。\n　「バスチーユは落ちたが、まだ他にもバスチーユはあるんだ。突撃だ！　虚偽を攻撃するんだ！　『闇夜』を攻撃するんだ！　『精神』が『暴力』を征服するんだ」（宮本正清訳）\n　戸田先生も、生涯の最後に獅子吼された。\n　「追撃の手をゆるめるな！」\n　この闘争心があるかぎり、学会は前進し続ける。\n　　　　　　◇\n　四十七年前（一九五四年）の秋、青年部の初の体育大会「世紀の祭典」が、下高井戸の日大グラウンドで盛大に行われたことは、大いなる歴史である。\n　私の提案で始まったが、当初、先輩幹部は全員反対であった。戸田先生だけが賛成してくださり、第一回から三回連続で出席し、青年を励ましてくださった。\n　師匠の慈愛に包まれ、若き弟子の力が躍動した祭典は、やがて文化祭運動の大河に広がった。\n　新しき歴史と文化を拓く、若獅子たちの大舞台――それが、わが世田谷である。\n　「創価」の二字は、現実の荒波のなかで、懸命に生き抜く民衆の勝鬨となった。\n　それは、気取った流行などに流されることのない、真剣勝負の生命の触発のみが放つ、人間の真実の光彩だ。\n　そこには無限の力がある。\n　人間よ、燃えて輝け！\n　われらは、その人間復興の大運動の先頭に君臨しているのだ。\n　アメリカの哲人エマソンは言った。\n　「もしも魂がいきいきしていて強力なら、あらゆる方面でその境界をいっきに突破し、大海原に新たな軌道を広げる」（酒本雅之訳）\n　その通りだ。\n　さあ、新しき前進だ。拡大だ。開拓だ！\n　勇敢に、汝自身の新しき扉を開くのだ！\n　進もう、世田谷の友よ！\n　新世紀の光輝ある旗手よ！"},
  {id:"e2005",date:"2005年6月16日",title:"創価は太陽！君よ誇り高く輝け！",subtitle:"随筆 人間世紀の光 85 / 世田谷の人材の大城",author:"山本伸一",publication:"聖教新聞",summary:"「青年こそ新世紀を創る英雄」とのテーマで世田谷の人材の大城を讃える随筆。牧口先生・戸田先生と世田谷の深い関わり、そして「勝利の智慧と力は『勇気』の二字から！」との力強いメッセージ。",body:"随筆　人間世紀の光　８５　山本伸一\n青年こそ新世紀を創る英雄\n\n　「百の理論よりも一の実行が尊い」\n　これは、平和のため、世界へ行動を広げた新渡戸稲造博士の信念であった。牧口先生とも深い交友の方である。\n　仏法も行動だ。現実の行動こそが命だ。\n　勇気の一歩を、踏み出せ！\n　そこに、本当の智慧も力も出る。そこに、大勝利の突破口も開けるのだ。\n　　　　　　◇\n　若き日、私は、恩師・戸田先生の命を受けて、世田谷区の成城を訪ねたことがある。\n　昭和二十九年の一月、著名な民俗学者・柳田国男氏のお宅に、牧口先生の『価値論』を届けるためであった。\n　柳田氏は、牧口先生の長年の知己である。\n　『創価教育学体系』第一巻には、「行詰まった現代教育界を打開するに足る」一書として、期待あふるる推奨の序文も寄せてくださった。\n　牧口先生は、柳田氏に仏法の真髄を教えたいと、折伏もされていたようだ。\n　傲慢な軍国日本と戦われた牧口先生は、その後、国賊の烙印を押され、冷たい牢獄で生涯を閉じた。\n　「いったい誰が、牧口先生を殺したのだ！　この仇を取らずにおくものか！」\n　戸田先生は、獄中で慟哭した。激怒した。\n　しかも、その師の獄死に接しながら、牧口門下の誰も本気で怒らなかったことが、さらに許せなかった。\n　「学会に、腰抜けの人間はいらない。\n　悪への怒りなき者は去れ！\n　私は、最後の一人になっても戦う！」\n　牧口先生の十回忌（昭和二十八年十一月）に、戸田先生は、師の『価値論』を補訂・再版して世に問われた。\n　「この『価値論』を世界の大学に送りなさい！　世の学者に読ませるのだ！\n　牧口先生の偉大さを、必ず全世界に認めさせるのだ！」\n　事実、先生は、英文の解説も添えて、世界四百以上の大学へ、この『価値論』を送られたのである。\n　“見よ、世界よ！　見よ、学者たちよ！　これが、私の偉大な師匠だ！”と、戸田先生は誇り高かった。\n　私も、深く深く決意した。弟子が、必ず師匠の正義と真実を、全世界に宣揚しきることだ、と。\n　まさに、その時、戸田先生の名代として、若き私は、世田谷区の柳田宅を訪ねたのである。\n　あいにく柳田氏は不在であったが、誠意を尽くし、家人に『価値論』を託した。\n　戸田先生に報告すると、小さく頷いて言われた。\n　「そうか」―その一言に、私は、師の深い期待を感じ取っていた。\n　“大作、戦いは始まったばかりだ。一生涯、創価の正義を世界に示せ！”\n　　　　　　◇\n　戸田先生は、よく言われた。\n　「人生は種々なる苦難の峠である。生命力の弱き者は、絶えず泣きながら、苦しみながら、人生をわたるのである。生命力のたくましき者は、楽しみながら、わたるのである」\n　私は、どこへ出ようが、相手が誰であろうが、恐れるものは何もなかった。\n　一閻浮提第一の日蓮仏法を信奉しているからだ！\n　広宣流布の師・戸田先生の直弟子であるからだ！\n　この師弟不二の大道を貫き通す青年は、世界一の幸福者であり、最高の青春を生き抜く勝利者である。\n　「新しき世紀」を創る若き英雄なのである。\n　　\n　この同じ昭和二十九年の秋十一月七日――。\n　晴天であった。あまりにも青空が美事であった。\n　私が中心となり、世田谷の日大グラウンドで、「青年よ、世界に羽ばたけ！　青年よ、世界で戦い勝て！」との熱き思いで、第一回の青年部体育大会を開催した。\n　この日のことを、今もって、私は誇りとしている。\n　男女青年部の躍動の行動は、まるで「傑作の絵画」であり、「おとぎの世界」であった。\n　誇り高き青年の「勝利の乱舞」は、まさに、私たちが掲げた通り、「世紀の祭典」となった。\n　わが青年部は、足並みそろえて、全世界への第一歩を踏んだのだ。\n　いずこの学校の運動会や、大学の学園祭よりも、新しい未来を見つめゆく、若者らしい創意工夫が光っていた。すべてが新しい劇であった。行動であった。演技であった。\n　多数の参加者が驚嘆し、賞讃してくださった。\n　来賓として出席した人びとも、「さすが創価だ！　さすが創価だ！」と、ため息をつくほどであった。\n\n戸田先生は、心から喜んでくださった。\n　これで、創価の青年が厳然と、日本はおろか、世界広布の断固たる確信をもって、行進し始めていったことを！\n　先生は、一日中、世田谷の天地で、堂々と羽ばたく攻防戦に声援を送り、励ましてくださった。\n　白熱の競技、競走には、手を叩き、立ち上がって応援してくださったのである。\n　嬉しそうであった。\n　楽しそうであった。\n　そして「この青年たちが、未来の大創価学会を築いてくれるんだよ！」と、多くの方々に、意気揚々と語りかけられていた。\n　師は、「これでよし！　未来の学会は決まった」と思っていたにちがいない。\n　この日、大拍手のもと、戸田先生はあいさつされた。\n　「かくも若き人々が、事実のうえにおいても、りっぱに集まったことは、私自身の心からの喜びであり、これからの国家は今後、諸君に頼む以外にないと、私は確信する」\n　これは、わが師の、私たち青年への遺言となったのである。\n　あの世田谷のグラウンドに燃えた若き闘魂は、今もって我が生命から消えない。\n　　　　　　◇\n　戸田先生は指導された。\n　「青年の心を揺さぶるものは、青年の叫びである」と。\n　どこの誰が無責任に何を言おうが、下らぬ中傷批判など歯牙にもかけるな！　いな、木っ端微塵に打ち砕け！\n　京王線「芦花公園駅」に名を残す、世田谷ゆかりの作家・徳冨蘆花は、トルストイの影響を受けた。\n　そのトルストイは喝破している。\n　「（自分の）罪の弁護をするのは悪魔の所業である」\n　デマや讒言をまき散らし、何ら悪びれない輩は、まさに悪魔だ。ゆえに戦え！\n　「善心は恵みであり、喜悦であるのみならず、また同時に闘争の武器でもある」\n　その通りだ。\n　邪悪を責め続けてこそ、学会は「善の中の善」となり、「正義の中の正義」となった。\n　若き諸君は、それを断じて忘れてはならない。\n　また、戸田先生は叫ばれた。\n　「御書を拝さず、学会の信心指導を受けず、学会に迷惑をかける者は、断固、追放せよ」\n　　　　　　◇\n　戸田先生は、こうも言い遺された。\n　「派手な存在ではなく、地味な存在で、水の流れる如き信心の方々を最大に大事にすることである」と。\n　世田谷区は、東京二十三区第一の人口八十三万（推計）を擁する巨大都市である。ことに三十万もの青年が暮らし、未来性に富んでいる。\n　山の手の閑静な住宅街もあれば、下町の風情もある。若者で賑わう街もある。\n　この我が町・世田谷で、創価の人材群は、銀河の如く輝き、大河の如く社会を潤す。皆、人柄が良い。「後輩を自分以上の人材に！」という、麗しい気風があふれている。\n　なかでも、「仏教大学校」をはじめ、多彩な人材グループが、二十一世紀の今日まで、豊かな価値創造の人間大河を広げてきた。\n　壮年部の「洋々会」。\n　婦人部の「春光会」「香輝会」「桜香塾」。\n　男子部の「飛翔会」。\n　女子部の「誓光会」。\n　新会員育成のための、毎月の「ルネサンス大学校」も賑やかだ。\n　さらに「世田谷兄弟会」は二十周年を迎えた。\n　今春の記念総会には、全国から三千人以上もの懐かしき“世田谷家族”が晴れ晴れと集い合われている。\n　御聖訓には、「桜梅桃李の己己の当体を改めずして」（御書七八四ページ）と仰せである。\n　多様性は力だ。\n　「異体同心」の大世田谷よ！\n　多士済々の我が同志が心を合わせ、勇気の行動を結合していけば、不可能はない。\n　必ず偉大な勝利の歴史は築かれる。\n　　　　　　◇\n　私も、この世田谷に、平和と文化の「勝利の虹」を懸けるため、走り続けてきた。\n　桜丘の東京農業大学のキャンパスでの“農業展”に出席した折に、わが世田谷の同志と行った記念撮影は、まことに思い出深い。\n　また、駒沢の功労者宅への訪問。\n　赤堤の世田谷文化会館での「もちつき大会」。\n　砧の東宝撮影所の視察。玉川文化会館での懇談……。\n　用賀の東京池田記念講堂にも何度も足を運んだ。色とりどりの鉢植えや菊花を飾って迎えてくださった真心も、忘れられない。\n　奥沢の閑静な住宅街を訪ねたこともあった。私が十八歳の時に勤めた小さな印刷会社の社長宅である。\n　温かい心の社長であった。結核で苦しみながら働く私を励ましてくれた。\n　退職後、めったにお会いできなかったが、再会した瞬間に、時間の隙間は埋まった。喜びが心を満たした。\n　世田谷には、金の思い出が星のように光っている。\n　　　　　　◇\n　私は、世田谷にお住まいであった作家の井上靖氏と、昭和五十年春から一年間、書簡を交わした。\n　七月にお送りした書簡で、私は師の思い出を綴った。\n　「戸田先生は権力にも権威にもこびず、貧しい人の、苦労している民衆の味方でした。庶民の足下の問題を、膝をまじえつつ語り合う時、路地から路地へと一軒一軒、訪ねている時が、最もうれしそうでした。それに青年をこよなく愛された……」\n　恩師が出獄した昭和二十年の七月三日から、三十周年を迎えた時であった。\n　氏は返書で「たいへん心を打たれました」と、師弟の絆を賞讃してくださった。\n　今年は戸田先生の出獄から六十年。民衆の幸福と勝利こそ恩師の悲願であった。\n　井上氏は、「烈日」という言葉がお好きだった。\n　烈しく照りつける太陽のように、「烈しく何事かを為そうとした気持だけが、生きたということの証し」であると記されていた。\n　私も小説『人間革命』で、恩師の第二代会長就任を描いた章を、「烈日」と題した。\n　日々、太陽の如く全生命を完全燃焼させる！　それが、「太陽の仏法」を奉じた、わが創価の生き方だ。\n　太陽に停滞はない。太陽に諦めは絶対にない。\n　風が吹こうが、雲が出ようが、雨が降ろうが――\n　太陽の勇気で！\n　太陽の執念で！\n　太陽の慈愛で！\n　世田谷の太陽の同志よ！　わが友を励ますのだ。友の心に届くまで、対話の光を送るのだ。\n　誰が何と言おうが、自信満々と、君よ輝け！\n　日蓮大聖人は仰せである。\n　「始より終りまで弥信心をいたすべし・さなくして後悔やあらんずらん」（同一四四〇ページ）\n　「いかに強敵重なるとも・ゆめゆめ退する心なかれ恐るる心なかれ」（同五〇四ページ）\n　負けるな！　断じて負けるな！\n　世田谷の友よ！　完璧な団結で突き進め！\n　戸田先生は、青年を励まされた。\n　「山道を大きな石がふさいで前に進めない。しかし、どうしても行かなくてはいけない。どうするか、その時こそ、『勇気』を奮い起こし、『智慧』を発揮していくところに、信心の本当の深さがある」\n　おお、世田谷から、二十一世紀の広宣流布の旭日は昇りゆく。\n　おお、共に振れ！\n　新世紀の完勝の旗を！"},

// Utils
function fmt(s){return String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor((s%3600)/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function fmtH(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?h+"時間"+m+"分":m+"分";}
function cH(sec,pm){return Math.round(sec*pm/60);}
function ld(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function tdk(iso){return ld(new Date(iso));}
function jdt(iso){const d=new Date(iso);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function recomp(ss){let ts=0,th=0;ss.forEach(s=>{ts+=s.seconds;th+=s.hen;});return{totalSeconds:ts,totalHen:th};}
function rcAll(ss,pm){return ss.map(s=>({...s,hen:cH(s.seconds,pm)}));}
function dsum(ss){const m={};ss.forEach(s=>{const k=tdk(s.date);if(!m[k])m[k]={date:k,seconds:0,hen:0,count:0};m[k].seconds+=s.seconds;m[k].hen+=s.hen;m[k].count++;});return Object.values(m).sort((a,b)=>b.date.localeCompare(a.date));}
function last7(ss){const r=[],t=new Date();for(let i=6;i>=0;i--){const d=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);const k=ld(d);const dn=["日","月","火","水","木","金","土"][d.getDay()];const dm=(d.getMonth()+1)+"/"+d.getDate();const dd=ss.filter(s=>tdk(s.date)===k);r.push({key:k,dayName:dn,dateLabel:dm,hen:dd.reduce((a,s)=>a+s.hen,0),has:dd.length>0});}return r;}
function todH(ss){const k=ld(new Date());return ss.filter(s=>tdk(s.date)===k).reduce((a,s)=>a+s.hen,0);}
function stk(ss){if(!ss.length)return 0;const days=new Set(ss.map(s=>tdk(s.date)));let c=0;const d=new Date();while(days.has(ld(d))){c++;d.setDate(d.getDate()-1);}return c;}

  const open=(e)=>{setSel(e);setEditNote(notes[e.id]||"");setNoteSaved(false);setTimeout(()=>{const el=document.querySelector('[data-essay-scroll]');if(el)el.scrollTop=0;},10);};
  const saveNote=()=>{const nn={...notes,[sel.id]:editNote};setNotes(nn);saveEssayNotes(nn);setNoteSaved(true);setTimeout(()=>setNoteSaved(false),2000);};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:150,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{width:"100%",maxWidth:430,background:C.cream,borderRadius:"20px 20px 0 0",maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px 12px",borderBottom:"1px solid "+C.goldPale,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div><h2 style={{margin:0,fontSize:17,fontWeight:800,color:C.crimsonDark,fontFamily:"'Noto Serif JP',serif"}}>📖 世田谷への御指導</h2><div style={{fontSize:10,color:C.muted,marginTop:2}}>池田先生が世田谷に贈られた珠玉の指導</div></div>
        <button onClick={sel?()=>setSel(null):onClose} style={{border:"none",background:"transparent",fontSize:22,color:C.muted,cursor:"pointer",padding:4}}>{sel?"◀":"✕"}</button>
      </div>
      <div data-essay-scroll style={{flex:1,overflowY:"auto",padding:20}}>
        {!sel?<>
          {ESSAYS.map(e=>(<div key={e.id} onClick={()=>open(e)} style={{...S.card,cursor:"pointer",borderLeft:"3px solid "+C.crimson}}>
            <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:".05em",marginBottom:4}}>{e.date} · {e.publication}</div>
            <div style={{fontSize:15,fontWeight:800,color:C.crimsonDark,fontFamily:"'Noto Serif JP',serif",marginBottom:2,lineHeight:1.4}}>{e.title}</div>
            <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{e.subtitle}</div>
            {notes[e.id]&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed "+C.goldPale,fontSize:10,color:C.gold}}>✎ メモあり</div>}
          </div>))}
        </>:<>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:".05em",marginBottom:6}}>{sel.date} · {sel.publication}</div>
            <h3 style={{margin:0,fontSize:18,fontWeight:900,color:C.crimsonDark,fontFamily:"'Noto Serif JP',serif",lineHeight:1.4,marginBottom:6}}>{sel.title}</h3>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{sel.subtitle}</div>
            <div style={{fontSize:11,color:C.text,textAlign:"right"}}>— {sel.author}</div>
          </div>
          <div style={{...S.card,background:"linear-gradient(135deg,#fff,#faf6ef)",borderLeft:"3px solid "+C.gold}}>
            <div style={{fontSize:11,color:C.gold,fontWeight:700,marginBottom:8,letterSpacing:".05em"}}>📝 紹介</div>
            <p style={{margin:0,fontSize:13,lineHeight:1.9,color:C.text}}>{sel.summary}</p>
          </div>
          {sel.body?<div style={{...S.card,marginTop:12,background:"#fff",borderLeft:"3px solid "+C.crimson}}>
            <div style={{fontSize:11,color:C.crimson,fontWeight:700,marginBottom:10,letterSpacing:".05em"}}>📖 本文</div>
            <div style={{fontSize:13,lineHeight:2.2,color:C.text,fontFamily:"'Noto Serif JP',serif",whiteSpace:"pre-wrap"}}>{sel.body}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:12,paddingTop:8,borderTop:"1px solid "+C.goldPale,textAlign:"right"}}>© 聖教新聞社（許諾転載）</div>
          </div>:<div style={{padding:"14px 16px",background:"linear-gradient(135deg,#faf6ef,#f5e6c8)",borderRadius:8,fontSize:12,color:C.muted,lineHeight:1.7,marginTop:12,textAlign:"center",border:"1px dashed "+C.goldPale}}>
            <div style={{fontSize:18,marginBottom:6}}>📖</div>
            <div style={{fontWeight:700,color:C.crimsonDark,marginBottom:4}}>本文は近日公開予定です</div>
            <div style={{fontSize:11}}>しばらくお待ちください。<br/>紹介文と「わたしのメモ」は<br/>すぐにご利用いただけます。</div>
          </div>}
          <div style={{marginTop:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:"'Noto Serif JP',serif"}}>✎ わたしのメモ</div>
              {editNote!==(notes[sel.id]||"")&&<span style={{fontSize:10,color:"#ff9800",fontWeight:700}}>● 未保存</span>}
            </div>
            <div style={{fontSize:10,color:C.muted,marginBottom:8}}>心に残った言葉や決意を記録（端末に保存・他の人には見えません）</div>
            <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} placeholder="感じたこと、決意など..." style={{...S.textarea,minHeight:100}}/>
            <button onClick={saveNote} style={{...S.btnMain,width:"100%",marginTop:8,fontSize:13,minHeight:44}}>{noteSaved?"✓ 保存しました":"メモを保存"}</button>
          </div>
        </>}
      </div>
    </div>
  </div>);
}

function App(){const[tab,setTab]=useState("home");const[P,setP]=useState(null);const[loading,setLoading]=useState(true);const[needsName,setNeedsName]=useState(false);const[showSet,setShowSet]=useState(false);const[running,setRunningRaw]=useState(false);const[elapsed,setElapsed]=useState(0);const[startTime,setStartTime]=useState(null);const[showConf,setShowConf]=useState(false);const[savedMsg,setSavedMsg]=useState("");const[saving,setSaving]=useState(false);const[restored,setRestored]=useState("");const[lastSaved,setLastSaved]=useState(null);const[showEssays,setShowEssays]=useState(false);
const[cd,setCd]=useState(()=>Math.max(0,TARGET_DATE-Date.now()));
useEffect(()=>{const iv=setInterval(()=>setCd(Math.max(0,TARGET_DATE-Date.now())),1000);return()=>clearInterval(iv);},[]);
const cdD=Math.floor(cd/864e5),cdH=Math.floor((cd%864e5)/36e5),cdM=Math.floor((cd%36e5)/6e4),cdS=Math.floor((cd%6e4)/1e3);
const isEventDone=cd<=0;
const timerRef=useRef(null),stRef=useRef(null),runRef=useRef(false);
useEffect(()=>{runRef.current=running;},[running]);
useEffect(()=>{if(running&&startTime){stRef.current=startTime;timerRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime)/1000)),250);}else{if(timerRef.current)clearInterval(timerRef.current);}return()=>{if(timerRef.current)clearInterval(timerRef.current);};},[running,startTime]);
useEffect(()=>{const fn=()=>{if(document.visibilityState==="visible"&&stRef.current&&runRef.current){setElapsed(Math.floor((Date.now()-stRef.current)/1000));}if(document.visibilityState==="hidden"&&runRef.current&&stRef.current){saveTS(true,stRef.current);}};document.addEventListener("visibilitychange",fn);return()=>document.removeEventListener("visibilitychange",fn);},[]);
useEffect(()=>{const save=()=>{if(runRef.current&&stRef.current)saveTS(true,stRef.current);};window.addEventListener("beforeunload",save);window.addEventListener("pagehide",save);return()=>{window.removeEventListener("beforeunload",save);window.removeEventListener("pagehide",save);};},[]);
const setRunning=(v)=>{if(v==="reset"){setRunningRaw(false);setElapsed(0);setStartTime(null);stRef.current=null;clearTS();return;}if(v){setRunningRaw(true);const st=Date.now()-elapsed*1000;setStartTime(st);stRef.current=st;saveTS(true,st);}else{setRunningRaw(false);clearTS();}};
const gs=useGlobal(),sp=useSP(),active=useActive(P?.userId,P?.userName,running);
useEffect(()=>{const raw=loadL();if(raw){const m=migrate(raw);setP(m);if(!m.userName)setNeedsName(true);}else{setP(defP());setNeedsName(true);}
const ts=loadTS();if(ts){const el=Math.floor((Date.now()-ts.startTime)/1000);if(el>0&&el<86400){setRunningRaw(true);setStartTime(ts.startTime);stRef.current=ts.startTime;setElapsed(el);setRestored("唱題タイマーを復元（"+fmt(el)+"）");setTimeout(()=>setRestored(""),4000);}}
setLoading(false);const splash=document.getElementById("splash");if(splash){splash.style.opacity="0";setTimeout(()=>splash.remove(),300);};},[]);
useEffect(()=>{if(P&&!P.userName)setNeedsName(true);},[P]);
const handleName=(n)=>{const nd={...P,userName:n};setP(nd);saveL(nd);setNeedsName(false);};
const onSave=()=>{if(elapsed<=0||!P||saving)return;setSaving(true);vibrate();const hen=cH(elapsed,P.daimokuPerMin);const s={id:gid(),date:new Date().toISOString(),seconds:elapsed,hen};const ns=[...P.sessions,s];const t=recomp(ns);const nd={...P,...t,sessions:ns};setP(nd);saveL(nd);addG(hen,elapsed);setRunning("reset");clearTS();setLastSaved(hen);setShowConf(true);setSavedMsg(hen.toLocaleString()+"遍を記録！");setTimeout(()=>{setShowConf(false);setSavedMsg("");setSaving(false);},2500);};
if(loading)return(<div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",background:C.dark}}><div style={{textAlign:"center",color:C.goldLight}}><div style={{fontSize:48,marginBottom:16}}>🙏</div><div style={{fontSize:16,fontFamily:"'Noto Serif JP',serif"}}>読み込み中...</div></div></div>);
if(needsName)return <NameSetup onDone={handleName}/>;
return(<div style={S.app}><Confetti show={showConf}/>
{savedMsg&&<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",background:G.grn,color:"#fff",borderRadius:20,padding:"8px 20px",fontSize:14,fontWeight:700,zIndex:200,animation:"popIn .3s ease",boxShadow:"0 4px 20px rgba(0,0,0,.3)",whiteSpace:"nowrap"}}>🎉 {savedMsg}</div>}
{restored&&<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",borderRadius:20,padding:"8px 20px",fontSize:12,fontWeight:700,zIndex:200,animation:"popIn .3s ease",boxShadow:"0 4px 20px rgba(0,0,0,.3)",whiteSpace:"nowrap"}}>⏱ {restored}</div>}
<div style={S.header}><div style={S.headerInner}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<a href={MAIN} style={{fontSize:11,color:C.goldLight,textDecoration:"none",background:"rgba(255,255,255,.08)",borderRadius:6,padding:"5px 10px",display:"flex",alignItems:"center",gap:4}}>◀ <span style={{fontSize:10}}>練習サイト</span></a>
<div style={{textAlign:"center",flex:1}}><div style={{fontSize:17,fontWeight:900,fontFamily:"'Noto Serif JP',serif",letterSpacing:".08em"}}>題目<span style={{color:C.goldLight}}>フロイデ</span>{running&&<span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#76ff03",marginLeft:6,boxShadow:"0 0 8px #76ff03",animation:"pulse 1.5s infinite",verticalAlign:"middle"}}/>}{isAdmin()&&<span style={{fontSize:8,background:C.gold,color:C.dark,borderRadius:3,padding:"1px 5px",marginLeft:6,fontWeight:800,verticalAlign:"middle",letterSpacing:".05em"}}>ADMIN</span>}</div>{running&&<div style={{fontSize:9,color:"#76ff03",marginTop:1,letterSpacing:".1em"}}>● 唱題中</div>}</div>
<button onClick={()=>setShowSet(true)} style={{border:"none",background:"rgba(255,255,255,.08)",color:C.goldLight,fontSize:10,cursor:"pointer",borderRadius:6,padding:"5px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}><span style={{fontSize:14}}>⚙</span>設定</button>
</div></div></div>
{/* カウントダウン */}
<div style={S.countdown}><div style={S.cdBg}/><div style={{position:"relative",zIndex:1,padding:"6px 0"}}>
{isEventDone?(<>
<div style={{fontSize:14,fontWeight:900,color:C.goldLight,fontFamily:"'Noto Serif JP',serif"}}>🎉 世田谷ユースアクションフェス 🎉</div>
<div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:4}}>2026年11月29日（日）開催</div>
</>):(<>
<div style={{fontSize:11,letterSpacing:".15em",color:"rgba(255,255,255,.7)",marginBottom:10}}>🎵 本番まであと</div>
<div style={{display:"flex",justifyContent:"center",alignItems:"baseline",gap:4}}>
<div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:900,fontFamily:"'Noto Serif JP',serif",lineHeight:1}}>{cdD}</div><div style={{fontSize:9,letterSpacing:".1em",color:"rgba(255,255,255,.6)",marginTop:4}}>日</div></div>
<span style={{fontSize:28,opacity:.3,margin:"0 4px",alignSelf:"flex-start",paddingTop:4}}>·</span>
<div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:900,fontFamily:"'Noto Serif JP',serif",lineHeight:1}}>{String(cdH).padStart(2,"0")}</div><div style={{fontSize:9,letterSpacing:".1em",color:"rgba(255,255,255,.6)",marginTop:4}}>時間</div></div>
<span style={{fontSize:28,opacity:.3,margin:"0 4px",alignSelf:"flex-start",paddingTop:4}}>·</span>
<div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:900,fontFamily:"'Noto Serif JP',serif",lineHeight:1}}>{String(cdM).padStart(2,"0")}</div><div style={{fontSize:9,letterSpacing:".1em",color:"rgba(255,255,255,.6)",marginTop:4}}>分</div></div>
<span style={{fontSize:28,opacity:.3,margin:"0 4px",alignSelf:"flex-start",paddingTop:4}}>·</span>
<div style={{textAlign:"center"}}><div style={{fontSize:36,fontWeight:900,fontFamily:"'Noto Serif JP',serif",lineHeight:1,color:C.goldLight}}>{String(cdS).padStart(2,"0")}</div><div style={{fontSize:9,letterSpacing:".1em",color:"rgba(255,255,255,.6)",marginTop:4}}>秒</div></div>
</div>
<div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginTop:10,letterSpacing:".05em"}}>2026年11月29日（日）世田谷ユースアクションフェス本番</div>
</>)}
</div></div>
<div style={S.content}>
{tab==="home"&&<StopwatchTab P={P} setP={setP} gs={gs} active={active} elapsed={elapsed} running={running} setRunning={setRunning} onSave={onSave} saving={saving} lastSaved={lastSaved} openEssays={()=>setShowEssays(true)}/>}
{tab==="record"&&<RecordTab P={P} setP={setP}/>}
{tab==="prayer"&&<PrayerTab P={P} setP={setP} sp={sp}/>}
{tab==="goals"&&<GoalsTab P={P} setP={setP} gs={gs}/>}
{tab==="board"&&<BoardTab P={P}/>}
</div>
<div style={S.tabBar}>{TABS.map(t=>{const isA=tab===t.id,dot=t.id==="home"&&running&&tab!=="home";return(<button key={t.id} onClick={()=>setTab(t.id)} style={{...S.tabBtn,...(isA?S.tabBtnAct:{}),minHeight:44}}><span style={{fontSize:18,position:"relative"}}>{t.icon}{dot&&<span style={{position:"absolute",top:-2,right:-6,width:7,height:7,borderRadius:"50%",background:C.crimson}}/>}</span><span style={{fontSize:9,marginTop:1}}>{t.label}</span></button>);})}</div>
{showSet&&<SettingsPanel P={P} setP={setP} onClose={()=>setShowSet(false)}/>}
{showEssays&&<EssaysModal onClose={()=>setShowEssays(false)}/>}
</div>);}

const S={app:{maxWidth:430,margin:"0 auto",height:"100%",background:C.cream,fontFamily:"'Noto Sans JP',sans-serif",color:C.text,display:"flex",flexDirection:"column",overflow:"hidden"},header:{background:G.hdr,color:"#fff",position:"sticky",top:0,zIndex:10,borderBottom:"1px solid rgba(201,150,58,.3)",flexShrink:0,paddingTop:"env(safe-area-inset-top,0px)"},headerInner:{padding:"8px 10px 6px"},countdown:{background:G.crim,color:"#fff",textAlign:"center",padding:"14px 16px",position:"relative",overflow:"hidden",flexShrink:0},cdBg:{position:"absolute",inset:0,background:"repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.04) 8px,rgba(255,255,255,.04) 9px)"},content:{flex:1,paddingTop:8,paddingBottom:64,overflowY:"auto",WebkitOverflowScrolling:"touch"},tabBar:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,display:"flex",background:"#fff",borderTop:"1px solid "+C.goldPale,padding:"3px 0 env(safe-area-inset-bottom,5px)",zIndex:20},tabBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",border:"none",background:"transparent",padding:"3px 0",color:C.muted,cursor:"pointer"},tabBtnAct:{color:C.crimson},card:{background:C.cardBg,borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.05)",marginBottom:10,border:"1px solid rgba(0,0,0,.05)"},cumCard:{background:G.crim,color:"#fff",borderRadius:10,padding:"16px",textAlign:"center"},btnMain:{padding:"12px 24px",border:"none",borderRadius:50,background:G.btn,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(155,27,48,.3)"},btnSec:{padding:"10px 18px",border:"1px solid "+C.goldPale,borderRadius:50,background:C.cardBg,color:C.muted,fontSize:12,cursor:"pointer"},subTab:{flex:1,padding:"10px 0",border:"none",background:"transparent",fontSize:13,color:C.muted,cursor:"pointer",borderBottom:"2px solid transparent",marginBottom:-2},textarea:{width:"100%",padding:12,border:"1px solid "+C.goldPale,borderRadius:8,fontSize:13,resize:"vertical",minHeight:70,fontFamily:"inherit",boxSizing:"border-box",background:C.cream},input:{width:"100%",padding:10,border:"1px solid "+C.goldPale,borderRadius:8,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",background:C.cream}};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
