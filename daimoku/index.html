<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1208">
<title>題目フロイデ｜Re:Freude 世田谷 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:#FAF6EF;color:#2d1f0f;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// 🔥 Firebase設定（設定済み）
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyACCr1WZwQZL6DXR9QPG5EX4vZz9BJaYBw",
  authDomain:        "daimoku-freude.firebaseapp.com",
  databaseURL:       "https://daimoku-freude-default-rtdb.firebaseio.com",
  projectId:         "daimoku-freude",
  storageBucket:     "daimoku-freude.firebasestorage.app",
  messagingSenderId: "637502572501",
  appId:             "1:637502572501:web:c00b0f7e3f47b1ce21df5c"
};

let db = null;
try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); } catch(e) { console.warn("Firebase error:", e); }

const C = {crimson:"#9B1B30",crimsonDark:"#6d1220",gold:"#C9963A",goldLight:"#e8c06a",goldPale:"#f5e6c8",cream:"#FAF6EF",dark:"#1a1208",text:"#2d1f0f",muted:"#7a6a55",navy:"#1a3a5c",navyDark:"#0d2035",white:"#fff",cardBg:"#fff"};
const TABS = [{id:"home",label:"唱題",icon:"⏱"},{id:"record",label:"記録",icon:"📊"},{id:"prayer",label:"御祈念",icon:"🙏"},{id:"goals",label:"目標",icon:"🎯"}];
const SPEED_PRESETS = [{label:"ゆっくり",perMin:25,desc:"初心者・丁寧に"},{label:"ふつう",perMin:40,desc:"一般的なスピード"},{label:"はやい",perMin:55,desc:"慣れた方向け"},{label:"カスタム",perMin:null,desc:"自分で設定"}];

const PK="df-personal-v3";
function loadLocal(){try{return JSON.parse(localStorage.getItem(PK));}catch{return null;}}
function saveLocal(d){try{localStorage.setItem(PK,JSON.stringify(d));}catch{}}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function defaultPersonal(){return{userId:genId(),userName:"",daimokuPerMin:40,totalSeconds:0,totalHen:0,sessions:[],privatePrayers:[],goals:[{id:genId(),label:"11/29までに100万遍",target:1000000}],heartedIds:[]};}

function fmt(s){return`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
function calcHen(sec,pm){return Math.round(sec*pm/60);}
function localDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function toDateKey(iso){return localDate(new Date(iso));}
function jpDT(iso){const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function recompute(ss){let ts=0,th=0;ss.forEach(s=>{ts+=s.seconds;th+=s.hen;});return{totalSeconds:ts,totalHen:th};}
function recalcAll(ss,pm){return ss.map(s=>({...s,hen:calcHen(s.seconds,pm)}));}
function dailySum(ss){const m={};ss.forEach(s=>{const k=toDateKey(s.date);if(!m[k])m[k]={date:k,seconds:0,hen:0,count:0};m[k].seconds+=s.seconds;m[k].hen+=s.hen;m[k].count++;});return Object.values(m).sort((a,b)=>b.date.localeCompare(a.date));}
function last7(ss){const r=[],t=new Date();for(let i=6;i>=0;i--){const d=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);const k=localDate(d);const dn=["日","月","火","水","木","金","土"][d.getDay()];const dd=ss.filter(s=>toDateKey(s.date)===k);r.push({key:k,dayName:dn,hen:dd.reduce((a,s)=>a+s.hen,0),seconds:dd.reduce((a,s)=>a+s.seconds,0)});}return r;}

function useSharedPrayers(){
  const [prayers,setPrayers]=useState([]);
  useEffect(()=>{if(!db)return;const ref=db.ref("shared-prayers");const h=ref.on("value",snap=>{const v=snap.val();setPrayers(v?Object.values(v).sort((a,b)=>(b.hearts||0)-(a.hearts||0)):[]);});return()=>ref.off("value",h);},[]);
  return prayers;
}
function addSharedPrayer(p){if(db)db.ref("shared-prayers/"+p.id).set(p);}
function updateSharedPrayer(id,u){if(db)db.ref("shared-prayers/"+id).update(u);}
function deleteSharedPrayer(id){if(db)db.ref("shared-prayers/"+id).remove();}
function heartSharedPrayer(id){if(db)db.ref("shared-prayers/"+id+"/hearts").transaction(c=>(c||0)+1);}

function NameSetup({onDone}){
  const [name,setName]=useState("");
  return(<div style={{position:"fixed",inset:0,background:C.dark,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{textAlign:"center",padding:32,maxWidth:360}}>
      <div style={{fontSize:48,marginBottom:16}}>🙏</div>
      <div style={{fontSize:20,fontWeight:900,color:C.goldLight,fontFamily:"'Noto Serif JP',serif",marginBottom:4}}>題目<span style={{color:C.white}}>フロイデ</span></div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:28}}>Re:Freude ～わたしたちの新しい歓喜の歌～</div>
      <div style={{fontSize:14,color:C.cream,marginBottom:16}}>あなたの表示名を入力してください</div>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="例：比留間"
        style={{...S.input,background:"rgba(255,255,255,.1)",color:"#fff",border:`1px solid ${C.gold}`,textAlign:"center",fontSize:16,padding:14}}
        onKeyDown={e=>{if(e.key==="Enter"&&name.trim())onDone(name.trim())}}/>
      <button onClick={()=>{if(name.trim())onDone(name.trim())}} disabled={!name.trim()}
        style={{...S.btnMain,width:"100%",marginTop:16,opacity:name.trim()?1:.4}}>はじめる</button>
    </div>
  </div>);
}

function SettingsPanel({personal,setPersonal,onClose}){
  const [preset,setPreset]=useState(()=>{const p=SPEED_PRESETS.find(p=>p.perMin===personal.daimokuPerMin);return p?p.label:"カスタム";});
  const [cs,setCs]=useState(String(personal.daimokuPerMin));
  const [showRecalc,setShowRecalc]=useState(false);
  const [en,setEn]=useState(personal.userName);
  const cur=preset==="カスタム"?(parseInt(cs)||40):(SPEED_PRESETS.find(p=>p.label===preset)?.perMin||40);
  const changed=cur!==personal.daimokuPerMin;
  const apply=(recalc)=>{let ns=personal.sessions;if(recalc)ns=recalcAll(personal.sessions,cur);const t=recompute(ns);const nd={...personal,daimokuPerMin:cur,sessions:ns,...t};setPersonal(nd);saveLocal(nd);setShowRecalc(false);onClose();};
  const saveName=()=>{if(en.trim()){const nd={...personal,userName:en.trim()};setPersonal(nd);saveLocal(nd);}};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{width:"100%",maxWidth:430,background:C.cream,borderRadius:"20px 20px 0 0",padding:20,maxHeight:"85vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:C.text,fontFamily:"'Noto Serif JP',serif"}}>⚙ 設定</h2>
        <button onClick={onClose} style={{border:"none",background:"transparent",fontSize:22,color:C.muted,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>表示名</div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <input value={en} onChange={e=>setEn(e.target.value)} style={{...S.input,flex:1}}/>
        <button onClick={saveName} style={{...S.btnMain,padding:"8px 16px",fontSize:13}}>保存</button>
      </div>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:8,fontFamily:"'Noto Serif JP',serif"}}>唱題スピード</div>
      <p style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:12}}>自分に合ったスピードを設定すると遍数がより正確になります。</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {SPEED_PRESETS.map(p=>{const a=preset===p.label;return(<button key={p.label} onClick={()=>{setPreset(p.label);if(p.perMin)setCs(String(p.perMin));}}
          style={{padding:"12px 10px",borderRadius:8,cursor:"pointer",textAlign:"left",border:a?`2px solid ${C.crimson}`:`1px solid ${C.goldPale}`,background:a?`${C.crimson}10`:C.white}}>
          <div style={{fontSize:14,fontWeight:700,color:a?C.crimson:C.text}}>{p.label}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{p.perMin?`${p.perMin}遍/分`:"自由設定"}</div>
        </button>);})}
      </div>
      {preset==="カスタム"&&<div style={{...S.card,marginBottom:12}}><div style={{display:"flex",alignItems:"center",gap:8}}>
        <input type="range" min="10" max="80" value={cs} onChange={e=>setCs(e.target.value)} style={{flex:1,accentColor:C.crimson}}/>
        <input type="number" value={cs} onChange={e=>setCs(e.target.value)} style={{...S.input,width:70,textAlign:"center"}}/>
        <span style={{fontSize:12,color:C.muted}}>遍/分</span>
      </div></div>}
      <div style={{background:C.goldPale,borderRadius:8,padding:"10px 14px",marginBottom:16}}>
        <div style={{display:"flex",gap:16,marginTop:4}}>
          <div><span style={{fontWeight:800,color:C.crimson,fontSize:16}}>{calcHen(600,cur).toLocaleString()}</span><span style={{fontSize:11,color:C.muted}}> 遍/10分</span></div>
          <div><span style={{fontWeight:800,color:C.crimson,fontSize:16}}>{calcHen(3600,cur).toLocaleString()}</span><span style={{fontSize:11,color:C.muted}}> 遍/1時間</span></div>
        </div>
        {changed&&<div style={{fontSize:10,color:C.crimson,marginTop:4}}>{personal.daimokuPerMin} → {cur}遍/分</div>}
      </div>
      {changed&&!showRecalc&&<button onClick={()=>setShowRecalc(true)} style={{...S.btnMain,width:"100%",marginBottom:8}}>スピードを変更する</button>}
      {showRecalc&&<div style={{...S.card,border:`2px solid ${C.gold}`}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>過去の記録も再計算しますか？</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>apply(false)} style={{...S.btnSec,flex:1}}>今後のみ</button>
          <button onClick={()=>apply(true)} style={{...S.btnMain,flex:1,fontSize:13}}>全て再計算</button>
        </div>
      </div>}
      {!changed&&<button onClick={onClose} style={{...S.btnSec,width:"100%",marginTop:4}}>閉じる</button>}
    </div>
  </div>);
}

function StopwatchTab({personal,setPersonal}){
  const [running,setRunning]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const iRef=useRef(null),eRef=useRef(0);
  useEffect(()=>{eRef.current=elapsed;},[elapsed]);
  useEffect(()=>{if(running){const st=Date.now()-eRef.current*1000;iRef.current=setInterval(()=>{setElapsed(Math.floor((Date.now()-st)/1000));},250);}else{if(iRef.current)clearInterval(iRef.current);}return()=>{if(iRef.current)clearInterval(iRef.current);};},[running]);
  const doSave=()=>{if(elapsed<=0)return;const h=calcHen(elapsed,personal.daimokuPerMin);const sess={id:genId(),date:new Date().toISOString(),seconds:elapsed,hen:h};const ns=[...personal.sessions,sess];const t=recompute(ns);const nd={...personal,...t,sessions:ns};setPersonal(nd);saveLocal(nd);setElapsed(0);setRunning(false);};
  const prog=Math.min(elapsed/3600,1),circ=2*Math.PI*115,off=circ*(1-prog);
  return(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}>
    <div style={{display:"flex",justifyContent:"center",margin:"24px 0 8px"}}>
      <div style={{position:"relative",width:250,height:250}}>
        <svg width="250" height="250" viewBox="0 0 250 250">
          <circle cx="125" cy="125" r="115" fill="none" stroke={C.goldPale} strokeWidth="7"/>
          <circle cx="125" cy="125" r="115" fill="none" stroke="url(#cg)" strokeWidth="7" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} transform="rotate(-90 125 125)" style={{transition:"stroke-dashoffset .3s"}}/>
          <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={C.crimson}/><stop offset="100%" stopColor={C.gold}/></linearGradient></defs>
        </svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
          <div style={{fontSize:40,fontWeight:800,fontFamily:"'Noto Serif JP',serif",letterSpacing:2,color:C.dark}}>{fmt(elapsed)}</div>
          <div style={{fontSize:15,color:C.crimson,fontWeight:700,marginTop:4}}>{calcHen(elapsed,personal.daimokuPerMin).toLocaleString()} 遍</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{personal.daimokuPerMin}遍/分</div>
        </div>
      </div>
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"center",margin:"12px 0 20px"}}>
      <button onClick={()=>{setElapsed(0);setRunning(false);}} style={S.btnSec}>リセット</button>
      {running?(<button onClick={()=>setRunning(false)} style={{...S.btnMain,background:`linear-gradient(135deg,${C.navy},${C.navyDark})`}}>一時停止</button>)
      :(<button onClick={()=>setRunning(true)} style={S.btnMain}>{elapsed>0?"再開":"スタート"}</button>)}
      <button onClick={doSave} style={S.btnSec}>保存する</button>
    </div>
    <div style={S.cumCard}>
      <div style={{fontSize:11,color:"rgba(255,255,255,.7)",letterSpacing:".1em",marginBottom:4}}>あなたの福運貯金</div>
      <div style={{fontSize:34,fontWeight:900,fontFamily:"'Noto Serif JP',serif"}}>{personal.totalHen.toLocaleString()} <span style={{fontSize:14,fontWeight:400}}>遍</span></div>
      <div style={{display:"flex",gap:12,marginTop:12,justifyContent:"center"}}>
        <div style={S.cumSub}><div style={{fontSize:10,opacity:.7}}>唱題時間</div><div style={{fontSize:14,fontWeight:700}}>{Math.floor(personal.totalSeconds/3600)}時間{Math.floor((personal.totalSeconds%3600)/60)}分</div></div>
        <div style={S.cumSub}><div style={{fontSize:10,opacity:.7}}>セッション</div><div style={{fontSize:14,fontWeight:700}}>{personal.sessions.length}回</div></div>
      </div>
    </div>
  </div>);
}

function RecordTab({personal,setPersonal}){
  const [view,setView]=useState("daily");
  const [addMin,setAddMin]=useState("");
  const [addDate,setAddDate]=useState(()=>localDate(new Date()));
  const daily=dailySum(personal.sessions),l7=last7(personal.sessions),mx=Math.max(...l7.map(d=>d.hen),1);
  const addManual=()=>{const m=parseInt(addMin);if(!m||m<=0)return;const sec=m*60,h=calcHen(sec,personal.daimokuPerMin);const sess={id:genId(),date:new Date(`${addDate}T12:00:00+09:00`).toISOString(),seconds:sec,hen:h};const ns=[...personal.sessions,sess];const t=recompute(ns);const nd={...personal,...t,sessions:ns};setPersonal(nd);saveLocal(nd);setAddMin("");setView("daily");};
  const del=(sid)=>{const ns=personal.sessions.filter(s=>s.id!==sid);const t=recompute(ns);const nd={...personal,...t,sessions:ns};setPersonal(nd);saveLocal(nd);};
  return(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}>
    <div style={S.cumCard}>
      <div style={{fontSize:11,letterSpacing:".1em",opacity:.7,marginBottom:2}}>累計記録</div>
      <div style={{display:"flex",justifyContent:"center",gap:24}}>
        <div><div style={{fontSize:28,fontWeight:900,fontFamily:"'Noto Serif JP',serif"}}>{personal.totalHen.toLocaleString()}</div><div style={{fontSize:10,opacity:.7}}>遍</div></div>
        <div style={{borderLeft:"1px solid rgba(255,255,255,.2)",paddingLeft:24}}><div style={{fontSize:28,fontWeight:900,fontFamily:"'Noto Serif JP',serif"}}>{Math.floor(personal.totalSeconds/3600)}:{String(Math.floor((personal.totalSeconds%3600)/60)).padStart(2,"0")}</div><div style={{fontSize:10,opacity:.7}}>時間:分</div></div>
      </div>
    </div>
    <div style={{...S.card,marginTop:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12,fontFamily:"'Noto Serif JP',serif"}}>直近7日間</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
        {l7.map(d=>{const isT=d.key===localDate(new Date());return(<div key={d.key} style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:9,color:C.muted,marginBottom:4}}>{d.hen>0?d.hen.toLocaleString():""}</div>
          <div style={{height:d.hen>0?Math.max((d.hen/mx)*60,4):4,background:isT?`linear-gradient(180deg,${C.crimson},${C.crimsonDark})`:C.goldPale,borderRadius:3,transition:"height .3s"}}/>
          <div style={{fontSize:10,color:C.muted,marginTop:4}}>{d.dayName}</div>
        </div>);})}
      </div>
    </div>
    <div style={{display:"flex",marginTop:16,borderBottom:`2px solid ${C.goldPale}`}}>
      {[["daily","日別"],["sessions","全件"],["add","＋追加"]].map(([k,l])=>(<button key={k} onClick={()=>setView(k)} style={{...S.subTab,...(view===k?{color:C.crimson,fontWeight:700,borderBottomColor:C.crimson}:{})}}>{l}</button>))}
    </div>
    {view==="daily"&&<div style={{marginTop:12}}>{daily.length===0&&<p style={{color:C.muted,fontSize:13,padding:20,textAlign:"center"}}>まだ記録がありません</p>}
      {daily.map(d=>(<div key={d.date} style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14}}>{d.date.replace(/-/g,"/")}</div><div style={{fontSize:11,color:C.muted}}>{d.count}回</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:C.crimson}}>{d.hen.toLocaleString()} <span style={{fontSize:11,fontWeight:400}}>遍</span></div><div style={{fontSize:11,color:C.muted}}>{Math.floor(d.seconds/60)}分</div></div></div>))}</div>}
    {view==="sessions"&&<div style={{marginTop:12}}>{personal.sessions.length===0&&<p style={{color:C.muted,fontSize:13,padding:20,textAlign:"center"}}>まだ記録がありません</p>}
      {[...personal.sessions].reverse().map(s=>(<div key={s.id} style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:13,fontWeight:600}}>{jpDT(s.date)}</div><div style={{fontSize:11,color:C.muted}}>{fmt(s.seconds)}</div></div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{fontWeight:700,fontSize:15,color:C.crimson}}>{s.hen.toLocaleString()}</div><button onClick={()=>del(s.id)} style={{border:"none",background:"transparent",color:C.muted,fontSize:16,cursor:"pointer"}}>×</button></div></div>))}</div>}
    {view==="add"&&<div style={{...S.card,marginTop:12}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:12,fontFamily:"'Noto Serif JP',serif"}}>過去のお題目を追加</div>
      <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>日付</label>
      <input type="date" value={addDate} onChange={e=>setAddDate(e.target.value)} style={S.input}/>
      <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4,marginTop:12}}>唱題時間（分）</label>
      <input type="number" value={addMin} onChange={e=>setAddMin(e.target.value)} placeholder="30" style={S.input}/>
      <div style={{fontSize:11,color:C.muted,marginTop:6}}>≈ {addMin?calcHen(parseInt(addMin||"0")*60,personal.daimokuPerMin).toLocaleString():0} 遍</div>
      <button onClick={addManual} style={{...S.btnMain,width:"100%",marginTop:16}}>追加する</button>
    </div>}
  </div>);
}

function PrayerTab({personal,setPersonal,sharedPrayers}){
  const [tab,setTab]=useState("mine");
  const [np,setNp]=useState("");
  const [editId,setEditId]=useState(null);
  const [editText,setEditText]=useState("");
  const addPrivate=()=>{if(!np.trim())return;const nd={...personal,privatePrayers:[...personal.privatePrayers,{id:genId(),text:np}]};setPersonal(nd);saveLocal(nd);setNp("");};
  const addPublic=()=>{if(!np.trim())return;addSharedPrayer({id:genId(),text:np,authorId:personal.userId,authorName:personal.userName,hearts:0,createdAt:new Date().toISOString()});setNp("");};
  const editPrivate=(id)=>{const nd={...personal,privatePrayers:personal.privatePrayers.map(p=>p.id===id?{...p,text:editText}:p)};setPersonal(nd);saveLocal(nd);setEditId(null);};
  const delPrivate=(id)=>{const nd={...personal,privatePrayers:personal.privatePrayers.filter(p=>p.id!==id)};setPersonal(nd);saveLocal(nd);};
  const doHeart=(pid)=>{if(personal.heartedIds.includes(pid))return;heartSharedPrayer(pid);const nd={...personal,heartedIds:[...personal.heartedIds,pid]};setPersonal(nd);saveLocal(nd);};
  const myPublic=sharedPrayers.filter(p=>p.authorId===personal.userId);
  return(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}>
    <div style={{display:"flex",borderBottom:`2px solid ${C.goldPale}`}}>
      {[["mine","自分の祈念"],["public","みんなの祈念"]].map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{...S.subTab,...(tab===k?{color:C.crimson,fontWeight:700,borderBottomColor:C.crimson}:{})}}>{l}</button>))}
    </div>
    {tab==="mine"&&<div style={{marginTop:12}}>
      <div style={{...S.card,marginBottom:12}}>
        <textarea value={np} onChange={e=>setNp(e.target.value)} placeholder="御祈念項目を入力..." style={S.textarea}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={addPrivate} style={{...S.btnSec,flex:1,fontSize:12}}>🔒 非公開で追加</button>
          <button onClick={addPublic} style={{...S.btnMain,flex:1,fontSize:12,padding:"8px 12px"}}>🌍 公開して追加</button>
        </div>
      </div>
      {personal.privatePrayers.length===0&&myPublic.length===0&&<p style={{color:C.muted,fontSize:13,textAlign:"center",padding:16}}>御祈念項目を追加しましょう</p>}
      {personal.privatePrayers.map(p=>(<div key={p.id} style={S.card}>
        {editId===p.id?(<><textarea value={editText} onChange={e=>setEditText(e.target.value)} style={S.textarea}/>
          <div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>setEditId(null)} style={{...S.btnSec,flex:1,fontSize:12}}>キャンセル</button><button onClick={()=>editPrivate(p.id)} style={{...S.btnMain,flex:1,fontSize:12,padding:"8px 12px"}}>保存</button></div>
        </>):(<><p style={{margin:0,fontSize:13,lineHeight:1.7}}>{p.text}</p>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
            <span style={{fontSize:11,color:C.muted}}>🔒 非公開</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setEditId(p.id);setEditText(p.text);}} style={{border:"none",background:"transparent",fontSize:12,color:C.crimson,cursor:"pointer"}}>編集</button>
              <button onClick={()=>delPrivate(p.id)} style={{border:"none",background:"transparent",fontSize:12,color:C.muted,cursor:"pointer"}}>削除</button>
            </div>
          </div></>)}
      </div>))}
      {myPublic.map(p=>(<div key={p.id} style={{...S.card,border:`1px solid ${C.goldPale}`}}>
        {editId===p.id?(<><textarea value={editText} onChange={e=>setEditText(e.target.value)} style={S.textarea}/>
          <div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>setEditId(null)} style={{...S.btnSec,flex:1,fontSize:12}}>キャンセル</button><button onClick={()=>{updateSharedPrayer(p.id,{text:editText});setEditId(null);}} style={{...S.btnMain,flex:1,fontSize:12,padding:"8px 12px"}}>保存</button></div>
        </>):(<><p style={{margin:0,fontSize:13,lineHeight:1.7}}>{p.text}</p>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
            <span style={{fontSize:11,color:C.crimson}}>🌍 公開中 · ♥ {p.hearts||0}</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setEditId(p.id);setEditText(p.text);}} style={{border:"none",background:"transparent",fontSize:12,color:C.crimson,cursor:"pointer"}}>編集</button>
              <button onClick={()=>deleteSharedPrayer(p.id)} style={{border:"none",background:"transparent",fontSize:12,color:C.muted,cursor:"pointer"}}>削除</button>
            </div>
          </div></>)}
      </div>))}
    </div>}
    {tab==="public"&&<div style={{marginTop:12}}>
      {sharedPrayers.length===0&&<p style={{color:C.muted,fontSize:13,textAlign:"center",padding:20}}>まだ公開された祈念項目がありません</p>}
      {sharedPrayers.map(p=>{const isOwn=p.authorId===personal.userId;const hearted=personal.heartedIds.includes(p.id);return(<div key={p.id} style={S.card}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${C.crimson},${C.gold})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700,flexShrink:0}}>{(p.authorName||"?")[0]}</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{p.authorName||"匿名"}{isOwn&&<span style={{fontSize:10,color:C.crimson,marginLeft:6}}>（自分）</span>}</div></div>
        </div>
        <p style={{margin:0,fontSize:13,lineHeight:1.7}}>{p.text}</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
          <button onClick={()=>doHeart(p.id)} disabled={hearted||isOwn}
            style={{display:"flex",alignItems:"center",gap:6,border:`1px solid ${hearted?C.crimson:C.goldPale}`,borderRadius:20,padding:"6px 16px",cursor:hearted||isOwn?"default":"pointer",background:hearted?`${C.crimson}12`:C.white,fontSize:13,color:hearted?C.crimson:C.muted,fontWeight:hearted?700:400}}>
            <span style={{fontSize:16}}>{hearted?"♥":"♡"}</span> 祈りました {(p.hearts||0)>0&&<span style={{fontWeight:700}}>{p.hearts}</span>}
          </button>
          <div style={{fontSize:10,color:C.muted}}>{p.createdAt?new Date(p.createdAt).toLocaleDateString("ja-JP"):""}</div>
        </div>
      </div>);})}
    </div>}
  </div>);
}

function GoalsTab({personal,setPersonal}){
  const [showAdd,setShowAdd]=useState(false);
  const [nl,setNl]=useState("");const [nt,setNt]=useState("");
  const addG=()=>{const tv=parseInt(nt);if(!nl||isNaN(tv)||tv<=0)return;const nd={...personal,goals:[...personal.goals,{id:genId(),label:nl,target:tv}]};setPersonal(nd);saveLocal(nd);setNl("");setNt("");setShowAdd(false);};
  const delG=(id)=>{const nd={...personal,goals:personal.goals.filter(g=>g.id!==id)};setPersonal(nd);saveLocal(nd);};
  return(<div style={{padding:"0 16px",animation:"fadeIn .3s ease"}}>
    {personal.goals.map(g=>{const safe=g.target>0?g.target:1;const pct=Math.min((personal.totalHen/safe)*100,100);const rem=Math.max(g.target-personal.totalHen,0);return(<div key={g.id} style={{...S.card,marginTop:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,fontSize:15,fontFamily:"'Noto Serif JP',serif"}}>🎯 {g.label}</div><button onClick={()=>delG(g.id)} style={{border:"none",background:"transparent",color:C.muted,fontSize:14,cursor:"pointer"}}>×</button></div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:10,marginBottom:6}}><span style={{fontSize:12,color:C.muted}}>{personal.totalHen.toLocaleString()} / {g.target.toLocaleString()}</span><span style={{fontSize:13,fontWeight:800,color:C.crimson}}>{pct.toFixed(1)}%</span></div>
      <div style={{height:12,background:C.goldPale,borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:`linear-gradient(90deg,${C.crimson},${C.gold})`,width:`${pct}%`,transition:"width .5s"}}/></div>
      <div style={{fontSize:11,color:C.muted,marginTop:8,textAlign:"center"}}>あと <strong style={{color:C.crimson}}>{rem.toLocaleString()}</strong> 遍</div>
    </div>);})}
    {showAdd?(<div style={{...S.card,marginTop:16}}><input value={nl} onChange={e=>setNl(e.target.value)} placeholder="目標名" style={S.input}/><input type="number" value={nt} onChange={e=>setNt(e.target.value)} placeholder="目標遍数" style={{...S.input,marginTop:8}}/><div style={{display:"flex",gap:8,marginTop:12}}><button onClick={()=>setShowAdd(false)} style={S.btnSec}>キャンセル</button><button onClick={addG} style={{...S.btnMain,padding:"8px 20px",fontSize:13}}>追加</button></div></div>)
    :(<button onClick={()=>setShowAdd(true)} style={{...S.btnMain,width:"100%",marginTop:16}}>＋ 新しい目標を追加</button>)}
    <div style={{...S.cumCard,marginTop:24}}><div style={{fontSize:32,marginBottom:4}}>🐷</div><div style={{fontSize:11,opacity:.7,letterSpacing:".1em"}}>福運貯金</div><div style={{fontSize:30,fontWeight:900,fontFamily:"'Noto Serif JP',serif",marginTop:4}}>{personal.totalHen.toLocaleString()} <span style={{fontSize:13,fontWeight:400}}>遍</span></div></div>
  </div>);
}

function App(){
  const [tab,setTab]=useState("home");
  const [personal,setPersonal]=useState(null);
  const [loading,setLoading]=useState(true);
  const [needsName,setNeedsName]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const sharedPrayers=useSharedPrayers();
  useEffect(()=>{const p=loadLocal();if(p){const def=defaultPersonal();const m={...def,...p,sessions:p.sessions||[],privatePrayers:p.privatePrayers||[],goals:p.goals||def.goals,heartedIds:p.heartedIds||[]};const t=recompute(m.sessions);setPersonal({...m,...t});if(!m.userName)setNeedsName(true);}else{setPersonal(defaultPersonal());setNeedsName(true);}setLoading(false);},[]);
  const handleName=(name)=>{const nd={...personal,userName:name};setPersonal(nd);saveLocal(nd);setNeedsName(false);};
  if(loading)return(<div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",background:C.dark}}><div style={{textAlign:"center",color:C.goldLight}}><div style={{fontSize:48,marginBottom:16}}>🙏</div><div style={{fontSize:16,fontFamily:"'Noto Serif JP',serif"}}>読み込み中...</div></div></div>);
  if(needsName)return <NameSetup onDone={handleName}/>;
  const daysLeft=Math.max(0,Math.ceil((new Date("2026-11-29T00:00:00+09:00").getTime()-Date.now())/86400000));
  return(<div style={S.app}>
    <div style={S.header}><div style={S.headerInner}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{width:30}}/>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:10,letterSpacing:".2em",color:C.goldLight,marginBottom:2}}>SETAGAYA 2026</div>
        <div style={{fontSize:20,fontWeight:900,fontFamily:"'Noto Serif JP',serif",letterSpacing:".08em"}}>題目<span style={{color:C.goldLight}}>フロイデ</span></div>
        <div style={{fontSize:9,color:"rgba(255,255,255,.45)",marginTop:2}}>Re:Freude ～わたしたちの新しい歓喜の歌～</div>
      </div>
      <button onClick={()=>setShowSettings(true)} style={{border:"none",background:"transparent",color:C.goldLight,fontSize:18,cursor:"pointer",padding:4}}>⚙</button>
    </div></div></div>
    <div style={S.countdown}><div style={S.countdownBg}/>
      <div style={{position:"relative",zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{fontSize:10,letterSpacing:".12em",color:"rgba(255,255,255,.7)"}}>本番まであと</div>
        <div style={{display:"flex",alignItems:"baseline",gap:4}}><span style={{fontSize:30,fontWeight:900,fontFamily:"'Noto Serif JP',serif"}}>{daysLeft}</span><span style={{fontSize:11,opacity:.7}}>日</span></div>
        <div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>2026.11.29</div>
      </div>
    </div>
    <div style={S.content}>
      {tab==="home"&&<StopwatchTab personal={personal} setPersonal={setPersonal}/>}
      {tab==="record"&&<RecordTab personal={personal} setPersonal={setPersonal}/>}
      {tab==="prayer"&&<PrayerTab personal={personal} setPersonal={setPersonal} sharedPrayers={sharedPrayers}/>}
      {tab==="goals"&&<GoalsTab personal={personal} setPersonal={setPersonal}/>}
    </div>
    <div style={S.tabBar}>{TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{...S.tabBtn,...(tab===t.id?S.tabBtnActive:{})}}><span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:9,marginTop:1}}>{t.label}</span></button>))}</div>
    {showSettings&&<SettingsPanel personal={personal} setPersonal={setPersonal} onClose={()=>setShowSettings(false)}/>}
  </div>);
}

const S={
  app:{maxWidth:430,margin:"0 auto",height:"100%",background:C.cream,fontFamily:"'Noto Sans JP',sans-serif",color:C.text,display:"flex",flexDirection:"column",overflow:"hidden"},
  header:{background:`linear-gradient(135deg,${C.dark} 0%,#2d1a0a 50%,${C.dark} 100%)`,color:"#fff",position:"sticky",top:0,zIndex:10,borderBottom:`1px solid rgba(201,150,58,.3)`,flexShrink:0},
  headerInner:{padding:"12px 16px 10px"},
  countdown:{background:`linear-gradient(135deg,${C.crimsonDark},${C.crimson})`,color:"#fff",textAlign:"center",padding:"10px 16px",position:"relative",overflow:"hidden",flexShrink:0},
  countdownBg:{position:"absolute",inset:0,background:"repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(255,255,255,.04) 8px,rgba(255,255,255,.04) 9px)"},
  content:{flex:1,paddingTop:12,paddingBottom:72,overflowY:"auto",WebkitOverflowScrolling:"touch"},
  tabBar:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,display:"flex",background:"#fff",borderTop:`1px solid ${C.goldPale}`,padding:"4px 0 env(safe-area-inset-bottom,6px)",zIndex:20},
  tabBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",border:"none",background:"transparent",padding:"4px 0",color:C.muted,cursor:"pointer"},
  tabBtnActive:{color:C.crimson},
  card:{background:C.cardBg,borderRadius:8,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.05)",marginBottom:10,border:"1px solid rgba(0,0,0,.05)"},
  cumCard:{background:`linear-gradient(135deg,${C.crimsonDark},${C.crimson})`,color:"#fff",borderRadius:10,padding:"18px 16px",textAlign:"center"},
  cumSub:{background:"rgba(255,255,255,.12)",borderRadius:6,padding:"6px 14px"},
  btnMain:{padding:"12px 24px",border:"none",borderRadius:50,background:`linear-gradient(135deg,${C.crimson},${C.crimsonDark})`,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(155,27,48,.3)"},
  btnSec:{padding:"10px 18px",border:`1px solid ${C.goldPale}`,borderRadius:50,background:C.cardBg,color:C.muted,fontSize:12,cursor:"pointer"},
  subTab:{flex:1,padding:"10px 0",border:"none",background:"transparent",fontSize:13,color:C.muted,cursor:"pointer",borderBottom:"2px solid transparent",marginBottom:-2,fontFamily:"'Noto Sans JP',sans-serif"},
  textarea:{width:"100%",padding:12,border:`1px solid ${C.goldPale}`,borderRadius:8,fontSize:13,resize:"vertical",minHeight:70,fontFamily:"inherit",boxSizing:"border-box",background:C.cream},
  input:{width:"100%",padding:10,border:`1px solid ${C.goldPale}`,borderRadius:8,fontSize:13,fontFamily:"inherit",boxSizing:"border-box",background:C.cream},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
