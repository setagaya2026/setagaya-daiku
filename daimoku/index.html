// Utils
function fmt(s){return String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor((s%3600)/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function fmtH(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?h+"時間"+m+"分":m+"分";}
function cH(sec,pm){return Math.round(sec*pm/60);}
function ld(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function tdk(iso){return ld(new Date(iso));}
function jdt(iso){const d=new Date(iso);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function recomp(ss){let ts=0,th=0;ss.forEach(s=>{ts+=s.seconds;th+=s.hen;});return{totalSeconds:ts,totalHen:th};}
function rcAll(ss,pm){return ss.map(s=>({...s,hen:cH(s.seconds,pm)}));}
function dsum(ss){const m={};ss.forEach(s=>{const k=tdk(s.date);if(!m[k])m[k]={date:k,seconds:0,hen:0,count:0};m[k].seconds+=s.seconds;m[k].hen+=s.hen;m[k].count++;});return Object.values(m).sort((a,b)=>b.date.localeCompare(a.date));}
function last7(ss){const r=[],t=new Date();for(let i=6;i>=0;i--){const d=new Date(t.getFullYear(),t.getMonth(),t.getDate()-i);const k=ld(d);const dn=["日","月","火","水","木","金","土"][d.getDay()];const dd=ss.filter(s=>tdk(s.date)===k);r.push({key:k,dayName:dn,hen:dd.reduce((a,s)=>a+s.hen,0),has:dd.length>0});}return r;}
function todH(ss){const k=ld(new Date());return ss.filter(s=>tdk(s.date)===k).reduce((a,s)=>a+s.hen,0);}
function stk(ss){if(!ss.length)return 0;const days=new Set(ss.map(s=>tdk(s.date)));let c=0;const d=new Date();while(days.has(ld(d))){c++;d.setDate(d.getDate()-1);}return c;}
function daysLeft(){return Math.max(0,Math.ceil((TARGET_DATE-Date.now())/86400000));}

function useGlobal(){const[s,setS]=useState({totalHen:0,totalSessions:0,totalSeconds:0,ok:false});useEffect(()=>{if(!db)return;const ref=db.ref("global-stats");const h=ref.on("value",sn=>{const v=sn.val();if(v)setS({totalHen:v.totalHen||0,totalSessions:v.totalSessions||0,totalSeconds:v.totalSeconds||0,ok:true});},()=>{});const cr=db.ref(".info/connected");const ch=cr.on("value",sn=>setS(p=>({...p,ok:!!sn.val()})));return()=>{ref.off("value",h);cr.off("value",ch);};},[]);return s;}
function addG(hen,sec){if(!db)return;db.ref("global-stats/totalHen").transaction(c=>(c||0)+hen).catch(()=>{});db.ref("global-stats/totalSessions").transaction(c=>(c||0)+1).catch(()=>{});db.ref("global-stats/totalSeconds").transaction(c=>(c||0)+sec).catch(()=>{});}
function subG(hen,sec){if(!db)return;db.ref("global-stats/totalHen").transaction(c=>Math.max((c||0)-hen,0)).catch(()=>{});db.ref("global-stats/totalSessions").transaction(c=>Math.max((c||0)-1,0)).catch(()=>{});db.ref("global-stats/totalSeconds").transaction(c=>Math.max((c||0)-sec,0)).catch(()=>{});}

function useSP(){const[p,setP]=useState([]);useEffect(()=>{if(!db)return;const ref=db.ref("shared-prayers");const h=ref.on("value",sn=>{const v=sn.val();setP(v?Object.values(v).sort((a,b)=>(b.hearts||0)-(a.hearts||0)):[]);});return()=>ref.off("value",h);},[]);return p;}

{(()=>{const dl=daysLeft(),rem=Math.max((P.goalTarget||0)-P.totalHen,0),pace=dl>0&&rem>0?Math.ceil(rem/dl):0;if(pace<=0)return null;const todayRem=Math.max(pace-th,0);const pct=Math.min((th/pace)*100,100);return(<div style={{background:C.cardBg,borderRadius:8,padding:"8px 12px",marginBottom:6,border:"1px solid "+C.goldPale}}>

{v==="daily"&&<div style={{marginTop:12}}>{dy.length===0&&<p style={{color:C.muted,fontSize:13,padding:20,textAlign:"center"}}>まだ記録がありません</p>}{dy.map(d=>(<div key={d.date} style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14}}>{d.date.replace(/-/g,"/")}</div><div style={{fontSize:11,color:C.muted}}>{d.count}回</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:C.crimson}}>{d.hen.toLocaleString()} 遍</div><div style={{fontSize:11,color:C.muted}}>{Math.floor(d.seconds/60)}分</div></div></div>))}</div>}
